<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>링크온핏 CRM — 수업 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ── 메인 탭 ── */
        .class-tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            padding: 0 24px;
        }
        .class-tab {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color .15s, border-color .15s;
            margin-bottom: -1px;
        }
        .class-tab:hover  { color: var(--text-primary); }
        .class-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ── 수업 목록 ── */
        .routine-body {
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 0;
            flex: 1;
            min-height: 0;
        }
        .routine-main    { overflow: auto; border-right: 1px solid var(--border); }
        .routine-sidebar { padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; background: var(--surface); }
        .routine-donut-card {
            background: var(--surface-up);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .routine-donut-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-align: center; }
        .routine-donut-wrap  { position: relative; width: 100px; height: 100px; }
        .routine-donut-center {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .routine-pct  { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1; }
        .routine-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .type-tabs { display:flex; gap:4px; padding:14px 24px; border-bottom:1px solid var(--border); background:var(--surface); }
        .type-tab  { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
        .type-tab.active { background:var(--surface-up); border-color:var(--accent); color:var(--accent); font-weight:600; }
        .capacity-bar  { width:60px; height:5px; border-radius:3px; background:var(--border); overflow:hidden; display:inline-block; vertical-align:middle; margin-right:5px; }
        .capacity-fill { height:100%; background:var(--accent); border-radius:3px; }

        /* ── 캘린더 ── */
        .cal-wrap { padding: 20px 24px 32px; }
        .cal-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        .cal-month-label { font-size: 18px; font-weight: 700; color: var(--text-primary); min-width: 130px; }
        .cal-nav-btn {
            width: 32px; height: 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary);
        }
        .cal-nav-btn:hover { background: var(--surface-up); }
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .cal-dow {
            background: var(--surface-up);
            text-align: center;
            padding: 8px 0;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        .cal-dow:not(:last-child) { border-right: 1px solid var(--border); }
        .cal-cell {
            min-height: 90px;
            padding: 6px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            background: var(--surface);
            transition: background .1s;
        }
        .cal-cell:nth-child(7n) { border-right: none; }
        .cal-cell.other-month .cal-day-num { color: var(--text-muted); opacity: .4; }
        .cal-cell:hover { background: var(--surface-up); }
        .cal-cell.selected { background: rgba(9,105,218,.06); }
        .cal-day-num {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .cal-cell.today .cal-day-num {
            background: var(--accent);
            color: #fff;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .cal-dot {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 10px;
            margin: 1px 0;
            white-space: nowrap;
            overflow: hidden;
            max-width: 100%;
        }
        .cal-dot-pt  { background: rgba(9,105,218,.12); color: var(--accent); }
        .cal-dot-op  { background: rgba(26,127,55,.12);  color: var(--success); }
        .cal-day-detail {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            margin-top: 16px;
        }
        .cal-detail-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
        .cal-detail-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .cal-detail-item:last-child { border-bottom: none; }

        /* ── 원포인트 신청 ── */
        .op-filter-bar {
            display: flex;
            gap: 6px;
            padding: 16px 24px 0;
        }
        .op-status-btn {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        .op-status-btn.active { background: var(--surface-up); border-color: var(--accent); color: var(--accent); font-weight: 600; }

        @media(max-width:900px) { .routine-body { grid-template-columns:1fr; } .routine-sidebar { border-right:none; border-top:1px solid var(--border); } }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('classes')}"></aside>

<main class="main" style="display:flex;flex-direction:column;overflow:hidden">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">수업 관리</h1>
        </div>
        <div class="header-right" id="listHeaderActions">
            <input type="date" class="form-input" id="dateFilter" style="width:150px" onchange="loadClasses()">
            <button class="btn btn-primary" onclick="openModal()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                수업 등록
            </button>
        </div>
    </header>

    <!-- 메인 탭 -->
    <div class="class-tab-nav">
        <button class="class-tab active" id="classTab-list"      onclick="setClassTab('list',this)">수업 목록</button>
        <button class="class-tab"        id="classTab-schedule"  onclick="setClassTab('schedule',this)">트레이너 일정</button>
        <button class="class-tab"        id="classTab-onepoint"  onclick="setClassTab('onepoint',this)">원포인트 신청</button>
    </div>

    <!-- ─── 패널: 수업 목록 ─── -->
    <div id="panel-list" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="type-tabs">
            <button class="type-tab active" onclick="filterType('',this)">전체</button>
            <button class="type-tab" onclick="filterType('GROUP',this)">그룹 루틴</button>
            <button class="type-tab" onclick="filterType('PT',this)">PT 루틴</button>
            <button class="type-tab" onclick="filterType('OT',this)">OT</button>
        </div>
        <div class="routine-body">
            <div class="routine-main">
                <div class="table-wrap" style="margin:0">
                    <table>
                        <thead>
                            <tr>
                                <th>수업명</th><th>유형</th><th>카테고리</th>
                                <th>트레이너</th><th>날짜</th><th>시간</th>
                                <th>정원/신청</th><th>상태</th><th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="classTableBody">
                            <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
            <div class="routine-sidebar">
                <div class="routine-donut-card">
                    <div class="routine-donut-title">루틴 이행률</div>
                    <div class="routine-donut-wrap">
                        <canvas id="donutRoutine"></canvas>
                        <div class="routine-donut-center">
                            <div class="routine-pct" id="pctRoutine">-</div>
                            <div class="routine-desc">이행률</div>
                        </div>
                    </div>
                    <div style="font-size:12px;color:var(--text-secondary);text-align:center" id="descRoutine">루틴 이행 현황</div>
                </div>
                <div class="routine-donut-card">
                    <div class="routine-donut-title">오늘 출석률</div>
                    <div class="routine-donut-wrap">
                        <canvas id="donutAttend"></canvas>
                        <div class="routine-donut-center">
                            <div class="routine-pct" id="pctAttend">-</div>
                            <div class="routine-desc">출석률</div>
                        </div>
                    </div>
                    <div style="font-size:12px;color:var(--text-secondary);text-align:center" id="descAttend">오늘 출석 현황</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── 패널: 트레이너 일정 캘린더 ─── -->
    <div id="panel-schedule" style="display:none;overflow:auto;flex:1">
        <div class="cal-wrap">
            <div class="cal-header">
                <button class="cal-nav-btn" onclick="changeCalMonth(-1)">&#8249;</button>
                <span class="cal-month-label" id="calMonthLabel"></span>
                <button class="cal-nav-btn" onclick="changeCalMonth(1)">&#8250;</button>
                <span style="font-size:12px;color:var(--text-muted);margin-left:8px">
                    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:3px"></span>PT &nbsp;
                    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--success);margin-right:3px"></span>원포인트
                </span>
                <button class="btn btn-secondary" style="margin-left:auto;font-size:12px;padding:5px 12px" onclick="goToday()">오늘</button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
            <div class="cal-day-detail" id="calDayDetail" style="display:none">
                <div class="cal-detail-title" id="calDetailTitle"></div>
                <div id="calDetailList"></div>
            </div>
        </div>
    </div>

    <!-- ─── 패널: 원포인트 신청 ─── -->
    <div id="panel-onepoint" style="display:none;overflow:auto;flex:1">
        <div class="op-filter-bar">
            <button class="op-status-btn active" id="opBtn-" onclick="setOpStatus('',this)">전체</button>
            <button class="op-status-btn" id="opBtn-PENDING"   onclick="setOpStatus('PENDING',this)">대기중</button>
            <button class="op-status-btn" id="opBtn-APPROVED"  onclick="setOpStatus('APPROVED',this)">승인됨</button>
            <button class="op-status-btn" id="opBtn-REJECTED"  onclick="setOpStatus('REJECTED',this)">반려됨</button>
            <button class="op-status-btn" id="opBtn-CANCELLED" onclick="setOpStatus('CANCELLED',this)">취소됨</button>
        </div>
        <div class="table-wrap" style="margin:16px 24px 32px">
            <table>
                <thead>
                    <tr>
                        <th>회원</th><th>트레이너</th><th>신청일</th>
                        <th>희망 일시</th><th>신체 부위</th><th>통증 여부</th>
                        <th>상태</th><th>처리</th>
                    </tr>
                </thead>
                <tbody id="opTableBody">
                    <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="opPagination"></div>
    </div>

</main>

<!-- 수업 등록/수정 모달 -->
<div class="modal-overlay" id="classModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">수업 등록</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">수업명 *</label>
                    <input type="text" class="form-input" id="cTitle" placeholder="헬스 기초반">
                </div>
                <div class="form-group">
                    <label class="form-label">유형</label>
                    <select class="form-select" id="cType">
                        <option value="GROUP">그룹 루틴</option>
                        <option value="PT">PT 루틴</option>
                        <option value="OT">OT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">카테고리</label>
                    <select class="form-select" id="cCategory">
                        <option value="헬스">헬스</option>
                        <option value="필라테스">필라테스</option>
                        <option value="골프">골프</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">날짜</label>
                    <input type="date" class="form-input" id="cDate">
                </div>
                <div class="form-group">
                    <label class="form-label">정원</label>
                    <input type="number" class="form-input" id="cCapacity" value="10" min="1">
                </div>
                <div class="form-group">
                    <label class="form-label">시작 시간</label>
                    <input type="time" class="form-input" id="cStart">
                </div>
                <div class="form-group">
                    <label class="form-label">종료 시간</label>
                    <input type="time" class="form-input" id="cEnd">
                </div>
                <div class="form-group full">
                    <label class="form-label">트레이너명</label>
                    <input type="text" class="form-input" id="cTrainerName" placeholder="트레이너 이름">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="saveClass()">저장</button>
        </div>
    </div>
</div>

<!-- 신청자 목록 모달 -->
<div class="modal-overlay" id="attendeeModal">
    <div class="modal" style="max-width:520px">
        <div class="modal-header">
            <span class="modal-title" id="attendeeModalTitle">신청자 목록</span>
            <button class="modal-close" onclick="closeAttendeeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body" id="attendeeList" style="min-height:80px">
            <div style="color:var(--text-muted);font-size:13px">로딩 중...</div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeAttendeeModal()">닫기</button>
        </div>
    </div>
</div>

<!-- 원포인트 처리 모달 -->
<div class="modal-overlay" id="opModal">
    <div class="modal" style="max-width:420px">
        <div class="modal-header">
            <span class="modal-title" id="opModalTitle">원포인트 신청 처리</span>
            <button class="modal-close" onclick="closeOpModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group" style="margin-bottom:0">
                <label class="form-label">관리자 메모 (선택)</label>
                <textarea class="form-textarea" id="opNote" placeholder="처리 사유 또는 안내 메시지..." rows="3"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeOpModal()">취소</button>
            <button class="btn btn-primary" id="opConfirmBtn" onclick="confirmOpAction()">확인</button>
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   공통
═══════════════════════════════════════════════════════════ */
let currentPage = 0;
const pageSize = 10;
let currentType = '';
let editingId = null;
const donutCharts = {};

function csrfHeaders(extra) { return Object.assign({ 'Content-Type': 'application/json' }, extra); }
const typeLabel = { GROUP: '그룹 루틴', PT: 'PT 루틴', OT: 'OT' };
const typeBadge = { GROUP: 'badge-active', PT: 'badge-admin', OT: 'badge-pending' };

document.getElementById('dateFilter').valueAsDate = new Date();

// ── 메인 탭 전환 ──────────────────────────────────────────
function setClassTab(tab, btn) {
    ['list','schedule','onepoint'].forEach(t => {
        document.getElementById('panel-' + t).style.display        = t === tab ? (t === 'list' ? 'flex' : 'block') : 'none';
        document.getElementById('classTab-' + t).classList.toggle('active', t === tab);
    });
    document.getElementById('listHeaderActions').style.display = tab === 'list' ? '' : 'none';
    if (tab === 'schedule' && !calLoaded) initCalendar();
    if (tab === 'onepoint' && !opLoaded)  initOnepoint();
}

/* ═══════════════════════════════════════════════════════════
   패널 1: 수업 목록
═══════════════════════════════════════════════════════════ */
function filterType(type, btn) {
    currentType = type;
    document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentPage = 0;
    loadClasses();
}

async function loadClasses() {
    const date = document.getElementById('dateFilter').value;
    try {
        const res  = await fetch(`/api/classes?type=${currentType}&date=${date}&page=${currentPage}&size=${pageSize}`);
        const json = await res.json();
        renderTable(json.data.classes, json.data.total);
    } catch(e) {
        document.getElementById('classTableBody').innerHTML =
            `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">데이터를 불러올 수 없습니다.</td></tr>`;
    }
}

function renderTable(classes, total) {
    const tbody = document.getElementById('classTableBody');
    if (!classes || !classes.length) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">수업 데이터가 없습니다.</td></tr>`;
        renderPagination(0); return;
    }
    tbody.innerHTML = classes.map(c => {
        const pct = c.capacity > 0 ? Math.round(c.enrolled / c.capacity * 100) : 0;
        return `<tr>
            <td>${c.title}</td>
            <td><span class="badge ${typeBadge[c.type] || 'badge-pending'}">${typeLabel[c.type] || c.type}</span></td>
            <td>${c.category || '-'}</td>
            <td>${c.trainerName || '-'}</td>
            <td>${c.classDate || '-'}</td>
            <td>${c.startTime || ''} ~ ${c.endTime || ''}</td>
            <td>
                <div class="capacity-bar"><div class="capacity-fill" style="width:${pct}%"></div></div>
                ${c.enrolled}/${c.capacity}
            </td>
            <td><span class="badge ${c.status === 'OPEN' ? 'badge-active' : 'badge-expired'}">${c.status === 'OPEN' ? '진행중' : '취소됨'}</span></td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-secondary" style="padding:4px 9px;font-size:12px" onclick="editClass(${c.id})">수정</button>
                <button class="btn btn-secondary" style="padding:4px 9px;font-size:12px;color:var(--accent)" onclick="openAttendeeModal(${c.id},'${(c.title||'').replace(/'/g,'')}')">신청자</button>
                ${c.status === 'OPEN' ? `<button class="btn btn-danger" style="padding:4px 9px;font-size:12px" onclick="cancelClass(${c.id})">취소</button>` : ''}
            </td>
        </tr>`;
    }).join('');
    renderPagination(total);
}

function renderPagination(total) {
    const totalPages = Math.ceil(total / pageSize);
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>&#8249;</button>`;
    for (let i = 0; i < totalPages; i++)
        html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i+1}</button>`;
    html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages-1?'disabled':''}>&#8250;</button>`;
    pag.innerHTML = html;
}

function goPage(p) { currentPage = p; loadClasses(); }

function makeDonut(id, pct, color) {
    const ctx = document.getElementById(id).getContext('2d');
    if (donutCharts[id]) donutCharts[id].destroy();
    donutCharts[id] = new Chart(ctx, {
        type: 'doughnut',
        data: { datasets: [{ data: [pct, 100-pct], backgroundColor: [color, '#E5E7EB'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '72%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
    });
}

async function loadSideStats() {
    try {
        const today = new Date().toISOString().slice(0,10);
        const res   = await fetch(`/api/dashboard/attendance?date=${today}&period=monthly`);
        const { data } = await res.json();
        const rp = data.routineRate || 68;
        const ap = data.attendanceRate || 70;
        document.getElementById('pctRoutine').textContent = rp + '%';
        document.getElementById('descRoutine').textContent = `루틴 이행 ${rp}%`;
        makeDonut('donutRoutine', rp, '#F59E0B');
        document.getElementById('pctAttend').textContent = ap + '%';
        document.getElementById('descAttend').textContent = `출석 ${data.total || 0}명`;
        makeDonut('donutAttend', ap, '#10B981');
    } catch(e) {
        makeDonut('donutRoutine', 68, '#F59E0B');
        makeDonut('donutAttend', 70, '#10B981');
        document.getElementById('pctRoutine').textContent = '68%';
        document.getElementById('pctAttend').textContent = '70%';
    }
}

// 수업 등록/수정 모달
function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '수업 등록';
    document.getElementById('cTitle').value = '';
    document.getElementById('cType').value = 'GROUP';
    document.getElementById('cCategory').value = '헬스';
    document.getElementById('cDate').valueAsDate = new Date();
    document.getElementById('cCapacity').value = 10;
    document.getElementById('cStart').value = '';
    document.getElementById('cEnd').value = '';
    document.getElementById('cTrainerName').value = '';
    document.getElementById('classModal').classList.add('open');
}

async function editClass(id) {
    const res  = await fetch(`/api/classes/${id}`);
    const json = await res.json();
    const c    = json.data;
    editingId  = id;
    document.getElementById('modalTitle').textContent = '수업 수정';
    document.getElementById('cTitle').value       = c.title || '';
    document.getElementById('cType').value        = c.type  || 'GROUP';
    document.getElementById('cCategory').value    = c.category || '헬스';
    document.getElementById('cDate').value        = c.classDate || '';
    document.getElementById('cCapacity').value    = c.capacity || 10;
    document.getElementById('cStart').value       = c.startTime ? c.startTime.substring(0,5) : '';
    document.getElementById('cEnd').value         = c.endTime   ? c.endTime.substring(0,5)   : '';
    document.getElementById('cTrainerName').value = c.trainerName || '';
    document.getElementById('classModal').classList.add('open');
}

function closeModal() { document.getElementById('classModal').classList.remove('open'); }

async function saveClass() {
    const title = document.getElementById('cTitle').value.trim();
    if (!title) { alert('수업명을 입력해주세요.'); return; }
    const body = {
        title,
        type:        document.getElementById('cType').value,
        category:    document.getElementById('cCategory').value,
        classDate:   document.getElementById('cDate').value,
        capacity:    parseInt(document.getElementById('cCapacity').value),
        startTime:   document.getElementById('cStart').value,
        endTime:     document.getElementById('cEnd').value,
        trainerName: document.getElementById('cTrainerName').value,
    };
    const url    = editingId ? `/api/classes/${editingId}` : '/api/classes';
    const method = editingId ? 'PUT' : 'POST';
    await fetch(url, { method, headers: csrfHeaders(), body: JSON.stringify(body) });
    closeModal();
    loadClasses();
}

async function cancelClass(id) {
    if (!confirm('수업을 취소하시겠습니까?')) return;
    await fetch(`/api/classes/${id}`, { method: 'DELETE', headers: csrfHeaders() });
    loadClasses();
}

function closeAttendeeModal() { document.getElementById('attendeeModal').classList.remove('open'); }

/* ═══════════════════════════════════════════════════════════
   패널 2: 트레이너 일정 캘린더
═══════════════════════════════════════════════════════════ */
let calLoaded = false;
let calYear, calMonth, calSchedules = [];

function initCalendar() {
    calLoaded = true;
    const now = new Date();
    calYear  = now.getFullYear();
    calMonth = now.getMonth() + 1;
    loadCalendar();
}

async function loadCalendar() {
    const res  = await fetch(`/api/classes/schedules?year=${calYear}&month=${calMonth}`);
    const json = await res.json();
    calSchedules = json.data || [];
    renderCalendar();
}

function renderCalendar() {
    document.getElementById('calMonthLabel').textContent = `${calYear}년 ${calMonth}월`;
    const grid = document.getElementById('calGrid');

    // 요일 헤더
    const dows = ['일','월','화','수','목','금','토'];
    let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

    // 날짜 셀 구성
    const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth, 0).getDate();
    const daysInPrev  = new Date(calYear, calMonth - 1, 0).getDate();
    const today = new Date().toISOString().slice(0,10);

    // 이전달 잔여일
    for (let i = firstDay - 1; i >= 0; i--) {
        html += `<div class="cal-cell other-month"><div class="cal-day-num">${daysInPrev - i}</div></div>`;
    }

    // 이번달 날짜
    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = dateStr === today;
        const daySchedules = calSchedules.filter(s => s.scheduleDate === dateStr);

        const dots = daySchedules.slice(0,3).map(s =>
            `<div class="cal-dot ${s.type === 'PT' ? 'cal-dot-pt' : 'cal-dot-op'}">
                <span>${s.type === 'PT' ? 'PT' : '원P'}</span>
                <span style="opacity:.7">${(s.trainerName||'').slice(0,3)}</span>
             </div>`
        ).join('');
        const more = daySchedules.length > 3 ? `<div style="font-size:10px;color:var(--text-muted)">+${daySchedules.length-3}건</div>` : '';

        html += `<div class="cal-cell${isToday ? ' today' : ''}" onclick="selectCalDay('${dateStr}')">
            <div class="cal-day-num">${d}</div>
            ${dots}${more}
        </div>`;
    }

    // 다음달 채우기
    const totalCells = firstDay + daysInMonth;
    const remaining  = (7 - (totalCells % 7)) % 7;
    for (let d = 1; d <= remaining; d++) {
        html += `<div class="cal-cell other-month"><div class="cal-day-num">${d}</div></div>`;
    }

    grid.innerHTML = html;
}

function changeCalMonth(delta) {
    calMonth += delta;
    if (calMonth > 12) { calMonth = 1;  calYear++; }
    if (calMonth < 1)  { calMonth = 12; calYear--; }
    document.getElementById('calDayDetail').style.display = 'none';
    loadCalendar();
}

function goToday() {
    const now = new Date();
    calYear  = now.getFullYear();
    calMonth = now.getMonth() + 1;
    loadCalendar();
}

function selectCalDay(dateStr) {
    // 선택 표시
    document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
    const cells = document.querySelectorAll('.cal-cell:not(.other-month)');
    const day = parseInt(dateStr.split('-')[2]);
    const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
    if (cells[day - 1]) cells[day - 1].classList.add('selected');

    const daySchedules = calSchedules.filter(s => s.scheduleDate === dateStr);
    const detail = document.getElementById('calDayDetail');
    const title  = document.getElementById('calDetailTitle');
    const list   = document.getElementById('calDetailList');

    title.textContent = `${dateStr} 일정 (${daySchedules.length}건)`;
    detail.style.display = '';

    if (!daySchedules.length) {
        list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">이 날의 일정이 없습니다.</div>';
        return;
    }
    list.innerHTML = daySchedules.map(s => {
        const typeBadgeClass = s.type === 'PT' ? 'badge-admin' : 'badge-active';
        const typeText = s.type === 'PT' ? 'PT' : '원포인트';
        return `<div class="cal-detail-item">
            <span class="badge ${typeBadgeClass}" style="flex-shrink:0">${typeText}</span>
            <div style="flex:1">
                <div style="font-weight:600">${s.trainerName || s.trainerId}</div>
                <div style="color:var(--text-secondary);font-size:12px">
                    ${s.startTime ? s.startTime.substring(0,5) : ''} ~ ${s.endTime ? s.endTime.substring(0,5) : ''}
                    ${s.memberName ? ` &nbsp;·&nbsp; 회원: ${s.memberName}` : ''}
                    ${s.memo ? ` &nbsp;·&nbsp; ${s.memo}` : ''}
                </div>
            </div>
        </div>`;
    }).join('');
}

/* ═══════════════════════════════════════════════════════════
   패널 3: 원포인트 신청
═══════════════════════════════════════════════════════════ */
let opLoaded = false;
let opStatus = '';
let opPage   = 0;
const opPageSize = 20;

function initOnepoint() {
    opLoaded = true;
    loadOnepoint();
}

function setOpStatus(status, btn) {
    opStatus = status;
    opPage   = 0;
    document.querySelectorAll('.op-status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadOnepoint();
}

async function loadOnepoint() {
    const res  = await fetch(`/api/classes/onepoint/requests?status=${opStatus}&page=${opPage}&size=${opPageSize}`);
    const json = await res.json();
    renderOpTable(json.data.requests || [], json.data.total || 0);
}

const opStatusLabel = { PENDING: '대기중', APPROVED: '승인됨', REJECTED: '반려됨', CANCELLED: '취소됨', ACCEPTED: '수락됨', COMPLETED: '완료됨' };
const opStatusBadge = { PENDING: 'badge-pending', APPROVED: 'badge-active', REJECTED: 'badge-expired', CANCELLED: 'badge-suspended', ACCEPTED: 'badge-admin', COMPLETED: 'badge-muted' };

function renderOpTable(list, total) {
    const tbody = document.getElementById('opTableBody');
    if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">신청 내역이 없습니다.</td></tr>`;
        return;
    }
    tbody.innerHTML = list.map(r => {
        const parts = tryParseJson(r.bodyParts);
        const dates = tryParseJson(r.preferredDates);
        const partsStr = Array.isArray(parts) ? parts.join(', ') : (r.bodyParts || '-');
        const datesStr = Array.isArray(dates) ? dates.slice(0,2).join(', ') + (dates.length > 2 ? `…` : '') : (r.selectedDate || '-');
        const canAct   = r.status === 'PENDING';
        return `<tr>
            <td>${r.memberName || r.memberId}</td>
            <td>${r.trainerName || r.trainerId}</td>
            <td>${(r.createdAt||'').substring(0,10)}</td>
            <td style="font-size:12px">${datesStr}</td>
            <td style="font-size:12px">${partsStr}</td>
            <td style="text-align:center">${r.hasPain ? '<span style="color:var(--error)">있음</span>' : '<span style="color:var(--text-muted)">없음</span>'}</td>
            <td><span class="badge ${opStatusBadge[r.status]||''}">${opStatusLabel[r.status]||r.status}</span></td>
            <td style="display:flex;gap:5px">
                ${canAct ? `
                <button class="btn btn-secondary" style="padding:3px 9px;font-size:12px;color:var(--success)" onclick="openOpModal(${r.id},'APPROVED','${(r.memberName||r.memberId).replace(/'/g,'')}')">승인</button>
                <button class="btn btn-secondary" style="padding:3px 9px;font-size:12px;color:var(--error)"   onclick="openOpModal(${r.id},'REJECTED','${(r.memberName||r.memberId).replace(/'/g,'')}')">반려</button>
                ` : `<span style="font-size:12px;color:var(--text-muted)">${r.note || '-'}</span>`}
            </td>
        </tr>`;
    }).join('');

    // 페이지네이션
    const totalPages = Math.ceil(total / opPageSize);
    const pag = document.getElementById('opPagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goOpPage(${opPage-1})" ${opPage===0?'disabled':''}>&#8249;</button>`;
    for (let i = 0; i < totalPages; i++)
        html += `<button class="page-btn${i===opPage?' active':''}" onclick="goOpPage(${i})">${i+1}</button>`;
    html += `<button class="page-btn" onclick="goOpPage(${opPage+1})" ${opPage>=totalPages-1?'disabled':''}>&#8250;</button>`;
    pag.innerHTML = html;
}

function goOpPage(p) { opPage = p; loadOnepoint(); }

function tryParseJson(s) {
    try { return JSON.parse(s); } catch { return null; }
}

let opPendingId = null, opPendingAction = null;

function openOpModal(id, action, name) {
    opPendingId     = id;
    opPendingAction = action;
    document.getElementById('opNote').value = '';
    document.getElementById('opModalTitle').textContent =
        action === 'APPROVED' ? `승인 처리 — ${name}` : `반려 처리 — ${name}`;
    document.getElementById('opConfirmBtn').textContent  = action === 'APPROVED' ? '승인' : '반려';
    document.getElementById('opConfirmBtn').style.background =
        action === 'APPROVED' ? 'var(--success)' : 'var(--error)';
    document.getElementById('opModal').classList.add('open');
}

function closeOpModal() {
    document.getElementById('opModal').classList.remove('open');
    opPendingId = opPendingAction = null;
}

async function confirmOpAction() {
    const note = document.getElementById('opNote').value.trim();
    await fetch(`/api/classes/onepoint/requests/${opPendingId}/status`, {
        method: 'PATCH',
        headers: csrfHeaders(),
        body: JSON.stringify({ status: opPendingAction, note })
    });
    closeOpModal();
    loadOnepoint();
}

loadClasses();
loadSideStats();

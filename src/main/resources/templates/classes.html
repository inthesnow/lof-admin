<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK_Fit Admin — 수업 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        .type-tabs { display:flex; gap:4px; padding:14px 24px; border-bottom:1px solid var(--border); background:var(--surface); }
        .type-tab { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; }
        .type-tab.active { background:var(--surface-up); border-color:var(--accent); color:var(--accent); font-weight:600; }
        .capacity-bar { width:80px; height:6px; border-radius:3px; background:var(--border); overflow:hidden; display:inline-block; vertical-align:middle; margin-right:6px; }
        .capacity-fill { height:100%; background:var(--accent); border-radius:3px; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('classes')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">수업 관리</h1>
        </div>
        <div class="header-right">
            <input type="date" class="form-input" id="dateFilter" style="width:160px" onchange="loadClasses()">
            <button class="btn btn-primary" onclick="openModal()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                수업 등록
            </button>
        </div>
    </header>

    <div class="type-tabs">
        <button class="type-tab active" onclick="filterType('', this)">전체</button>
        <button class="type-tab" onclick="filterType('GROUP', this)">그룹 수업</button>
        <button class="type-tab" onclick="filterType('PT', this)">개인 레슨</button>
        <button class="type-tab" onclick="filterType('OT', this)">OT</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>수업명</th>
                    <th>유형</th>
                    <th>카테고리</th>
                    <th>트레이너</th>
                    <th>날짜</th>
                    <th>시간</th>
                    <th>정원/신청</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="classTableBody">
                <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</main>

<!-- 수업 등록 모달 -->
<div class="modal-overlay" id="classModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">수업 등록</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">수업명 *</label>
                    <input type="text" class="form-input" id="cTitle" placeholder="헬스 기초반">
                </div>
                <div class="form-group">
                    <label class="form-label">유형</label>
                    <select class="form-select" id="cType">
                        <option value="GROUP">그룹 수업</option>
                        <option value="PT">개인 레슨</option>
                        <option value="OT">OT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">카테고리</label>
                    <select class="form-select" id="cCategory">
                        <option value="헬스">헬스</option>
                        <option value="필라테스">필라테스</option>
                        <option value="골프">골프</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">날짜</label>
                    <input type="date" class="form-input" id="cDate">
                </div>
                <div class="form-group">
                    <label class="form-label">정원</label>
                    <input type="number" class="form-input" id="cCapacity" value="10" min="1">
                </div>
                <div class="form-group">
                    <label class="form-label">시작 시간</label>
                    <input type="time" class="form-input" id="cStart">
                </div>
                <div class="form-group">
                    <label class="form-label">종료 시간</label>
                    <input type="time" class="form-input" id="cEnd">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="saveClass()">저장</button>
        </div>
    </div>
</div>

<script>
let currentPage = 0;
const pageSize = 10;
let currentType = '';
let editingId = null;

const typeLabel = { GROUP: '그룹', PT: '개인레슨', OT: 'OT' };
const typeBadge = { GROUP: 'badge-active', PT: 'badge-admin', OT: 'badge-pending' };

document.getElementById('dateFilter').valueAsDate = new Date();

function filterType(type, btn) {
    currentType = type;
    document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    currentPage = 0;
    loadClasses();
}

async function loadClasses() {
    const date = document.getElementById('dateFilter').value;
    const res = await fetch(`/api/classes?type=${currentType}&date=${date}&page=${currentPage}&size=${pageSize}`);
    const json = await res.json();
    renderTable(json.data.classes, json.data.total);
}

function renderTable(classes, total) {
    const tbody = document.getElementById('classTableBody');
    if (!classes.length) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">수업 데이터가 없습니다.</td></tr>`;
        return;
    }
    tbody.innerHTML = classes.map(c => {
        const pct = c.capacity > 0 ? Math.round(c.enrolled / c.capacity * 100) : 0;
        return `<tr>
            <td>${c.title}</td>
            <td><span class="badge ${typeBadge[c.type]}">${typeLabel[c.type]}</span></td>
            <td>${c.category}</td>
            <td>${c.trainerName || '-'}</td>
            <td>${c.classDate || '-'}</td>
            <td>${c.startTime || ''} ~ ${c.endTime || ''}</td>
            <td>
                <div class="capacity-bar"><div class="capacity-fill" style="width:${pct}%"></div></div>
                ${c.enrolled}/${c.capacity}
            </td>
            <td><span class="badge ${c.status === 'OPEN' ? 'badge-open' : 'badge-cancelled'}">${c.status === 'OPEN' ? '진행중' : '취소됨'}</span></td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-danger" style="padding:5px 10px;font-size:12px" onclick="cancelClass(${c.id})">취소</button>
            </td>
        </tr>`;
    }).join('');
}

function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '수업 등록';
    document.getElementById('cDate').valueAsDate = new Date();
    document.getElementById('classModal').classList.add('open');
}

function closeModal() { document.getElementById('classModal').classList.remove('open'); }

async function saveClass() {
    const body = {
        title: document.getElementById('cTitle').value,
        type: document.getElementById('cType').value,
        category: document.getElementById('cCategory').value,
        classDate: document.getElementById('cDate').value,
        capacity: parseInt(document.getElementById('cCapacity').value),
        startTime: document.getElementById('cStart').value,
        endTime: document.getElementById('cEnd').value,
    };
    await fetch('/api/classes', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    closeModal();
    loadClasses();
}

async function cancelClass(id) {
    if (!confirm('수업을 취소하시겠습니까?')) return;
    await fetch(`/api/classes/${id}`, { method: 'DELETE' });
    loadClasses();
}

function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

loadClasses();
</script>
</body>
</html>

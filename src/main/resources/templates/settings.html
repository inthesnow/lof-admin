<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>링크온핏 CRM — 헬스장 설정</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* ── Settings layout ── */
        .settings-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 860px;
        }

        /* ── Open status card ── */
        .open-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            transition: border-color 0.3s;
        }
        .open-card.is-open  { border-color: var(--success); }
        .open-card.is-closed{ border-color: var(--error); }

        .open-card-left { display: flex; align-items: center; gap: 16px; }

        .open-indicator {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.3s;
        }
        .open-indicator svg { width: 26px; height: 26px; }
        .is-open  .open-indicator { background: color-mix(in srgb, var(--success) 15%, transparent); color: var(--success); }
        .is-closed .open-indicator { background: color-mix(in srgb, var(--error) 15%, transparent); color: var(--error); }

        .open-text {}
        .open-label {
            font-size: 11px; font-weight: 600; letter-spacing: 0.7px;
            text-transform: uppercase; color: var(--text-muted);
            margin-bottom: 4px;
        }
        .open-status {
            font-size: 20px; font-weight: 700;
            transition: color 0.3s;
        }
        .is-open  .open-status { color: var(--success); }
        .is-closed .open-status { color: var(--error); }
        .open-sub {
            font-size: 12px; color: var(--text-muted); margin-top: 3px;
        }

        /* Toggle switch */
        .toggle-wrap { display: flex; align-items: center; gap: 12px; }
        .toggle-label { font-size: 13px; color: var(--text-secondary); }
        .toggle {
            position: relative;
            width: 52px; height: 28px;
            flex-shrink: 0;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: var(--surface-up);
            border: 1px solid var(--border);
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.25s, border-color 0.25s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            left: 3px; top: 3px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: transform 0.25s, background 0.25s;
        }
        .toggle input:checked + .toggle-slider { background: var(--success); border-color: var(--success); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(24px); background: #fff; }

        /* ── Section card ── */
        .setting-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .setting-card-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .setting-card-header svg { width: 18px; height: 18px; color: var(--accent); flex-shrink: 0; }
        .setting-card-title { font-size: 14px; font-weight: 700; }
        .setting-card-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

        /* ── Form fields ── */
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .field-row.single { grid-template-columns: 1fr; }

        .field-group { display: flex; flex-direction: column; gap: 6px; }
        .field-label {
            font-size: 11px; font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .field-input {
            background: var(--surface-up);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            padding: 9px 12px;
            outline: none;
            transition: border-color 0.15s;
            width: 100%;
        }
        .field-input:focus { border-color: var(--accent); }
        .field-input::placeholder { color: var(--text-muted); }
        textarea.field-input { resize: vertical; min-height: 88px; font-family: inherit; line-height: 1.5; }

        /* ── Operating hours ── */
        .hours-table { width: 100%; border-collapse: collapse; }
        .hours-table th {
            text-align: left;
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.6px; color: var(--text-muted);
            padding: 0 8px 10px;
        }
        .hours-table th:first-child { padding-left: 0; }
        .hours-table td {
            padding: 5px 8px;
            vertical-align: middle;
        }
        .hours-table td:first-child { padding-left: 0; }
        .hours-table tr { border-bottom: 1px solid var(--border); }
        .hours-table tr:last-child { border-bottom: none; }

        .day-label {
            font-size: 13px; font-weight: 600; color: var(--text-primary);
            width: 32px;
        }
        .day-label.weekend { color: var(--warning); }
        .day-label.sunday  { color: var(--error); }

        .time-input {
            background: var(--surface-up);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-primary);
            font-size: 13px;
            padding: 7px 10px;
            outline: none;
            width: 100px;
            transition: border-color 0.15s;
            cursor: pointer;
        }
        .time-input:focus { border-color: var(--accent); }
        .time-input:disabled { opacity: 0.3; cursor: not-allowed; }

        .time-sep { color: var(--text-muted); font-size: 13px; padding: 0 4px; }

        .closed-row td { opacity: 0.4; }
        .closed-row .closed-cell { opacity: 1; }

        /* Checkbox for closed */
        .check-closed {
            display: flex; align-items: center; gap: 7px;
            cursor: pointer; font-size: 12px; color: var(--text-secondary);
            user-select: none;
        }
        .check-closed input[type=checkbox] { display: none; }
        .check-closed .check-box {
            width: 16px; height: 16px;
            border: 1.5px solid var(--border);
            border-radius: 4px;
            background: var(--surface-up);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, border-color 0.15s;
            flex-shrink: 0;
        }
        .check-closed input:checked + .check-box {
            background: var(--error);
            border-color: var(--error);
        }
        .check-closed input:checked + .check-box::after {
            content: '';
            width: 9px; height: 5px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(-45deg) translateY(-1px);
            display: block;
        }

        /* ── Save bar ── */
        .save-bar {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px;
            padding: 0 0 8px;
        }
        .save-hint { font-size: 12px; color: var(--text-muted); }
        .save-result {
            font-size: 13px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s;
        }
        .save-result.show { opacity: 1; }
        .save-result.ok   { color: var(--success); }
        .save-result.err  { color: var(--error); }

        /* ── Holiday ── */
        .holiday-toolbar {
            display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
        }
        .holiday-toolbar .field-group { flex: 1; min-width: 140px; }
        .type-tabs {
            display: flex; gap: 6px;
        }
        .type-tab {
            padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
            border: 1.5px solid var(--border); background: var(--surface-up);
            color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
        }
        .type-tab.active-public  { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
        .type-tab.active-closure { border-color: var(--warning); background: color-mix(in srgb, var(--warning) 12%, transparent); color: var(--warning); }

        .holiday-year-nav {
            display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
        }
        .holiday-year-nav button {
            background: var(--surface-up); border: 1px solid var(--border);
            border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 14px;
            color: var(--text-primary);
        }
        .holiday-year-nav span { font-size: 15px; font-weight: 700; min-width: 60px; text-align: center; }

        .holiday-list { display: flex; flex-direction: column; gap: 6px; }
        .holiday-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px;
            background: var(--surface-up); border: 1px solid var(--border);
        }
        .holiday-item .h-date { font-size: 13px; font-weight: 700; color: var(--text-primary); min-width: 100px; }
        .holiday-item .h-name { font-size: 13px; color: var(--text-secondary); flex: 1; }
        .holiday-item .h-type {
            font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 5px;
        }
        .h-type.PUBLIC  { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); }
        .h-type.CLOSURE { background: color-mix(in srgb, var(--warning) 12%, transparent); color: var(--warning); }

        /* ── Banner ── */
        .banner-upload-zone {
            border: 2px dashed var(--border); border-radius: 10px;
            padding: 28px; text-align: center; cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .banner-upload-zone:hover, .banner-upload-zone.drag-over {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 5%, transparent);
        }
        .banner-upload-zone svg { color: var(--text-muted); margin-bottom: 8px; }
        .banner-upload-zone p { font-size: 13px; color: var(--text-muted); margin: 4px 0; }
        .banner-upload-zone .upload-hint { font-size: 11px; color: var(--text-muted); }

        .banner-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px;
        }
        .banner-card {
            border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
            background: var(--surface-up); position: relative;
        }
        .banner-card img {
            width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
        }
        .banner-card-body {
            padding: 10px 12px;
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .banner-card-title { font-size: 12px; color: var(--text-secondary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .banner-inactive { opacity: 0.45; }
        .banner-inactive-badge {
            position: absolute; top: 6px; left: 6px;
            background: rgba(0,0,0,0.55); color: #fff;
            font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
        }

        @media (max-width: 640px) {
            .field-row { grid-template-columns: 1fr; }
            .open-card { flex-direction: column; align-items: flex-start; }
            .settings-body { padding: 16px; }
            .banner-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('settings')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">헬스장 설정</h1>
        </div>
    </header>

    <div class="settings-body">

        <!-- Save bar -->
        <div class="save-bar">
            <span class="save-hint">변경사항을 저장해야 적용됩니다.</span>
            <div style="display:flex;align-items:center;gap:12px">
                <span class="save-result" id="saveResult"></span>
                <button class="btn btn-primary" onclick="saveAll()">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
                    저장
                </button>
            </div>
        </div>

        <!-- Real-time open status -->
        <div class="open-card" id="openCard">
            <div class="open-card-left">
                <div class="open-indicator" id="openIndicator">
                    <!-- icon injected by JS -->
                </div>
                <div class="open-text">
                    <div class="open-label">실시간 영업 상태</div>
                    <div class="open-status" id="openStatusText"></div>
                    <div class="open-sub" id="openSubText"></div>
                </div>
            </div>
            <div class="toggle-wrap">
                <span class="toggle-label" id="toggleLabel"></span>
                <label class="toggle">
                    <input type="checkbox" id="isOpenToggle" onchange="onToggleOpen(this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <!-- Basic info -->
        <div class="setting-card">
            <div class="setting-card-header">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                <span class="setting-card-title">기본 정보</span>
            </div>
            <div class="setting-card-body">
                <div class="field-row">
                    <div class="field-group">
                        <label class="field-label" for="gymName">헬스장 이름</label>
                        <input type="text" class="field-input" id="gymName" placeholder="LINK_Fit" maxlength="100">
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="gymPhone">대표 전화</label>
                        <input type="tel" class="field-input" id="gymPhone" placeholder="02-0000-0000" maxlength="20">
                    </div>
                </div>
                <div class="field-row single">
                    <div class="field-group">
                        <label class="field-label" for="gymAddress">주소</label>
                        <input type="text" class="field-input" id="gymAddress" placeholder="서울시 강남구 테헤란로 123" maxlength="255">
                    </div>
                </div>
            </div>
        </div>

        <!-- Operating hours -->
        <div class="setting-card">
            <div class="setting-card-header">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
                <span class="setting-card-title">운영 시간</span>
            </div>
            <div class="setting-card-body">
                <table class="hours-table">
                    <thead>
                        <tr>
                            <th style="width:42px">요일</th>
                            <th>운영 시작</th>
                            <th></th>
                            <th>운영 종료</th>
                            <th style="width:80px; text-align:center">휴무</th>
                        </tr>
                    </thead>
                    <tbody id="hoursBody">
                        <!-- rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Notice -->
        <div class="setting-card">
            <div class="setting-card-header">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                <span class="setting-card-title">공지사항 / 메모</span>
            </div>
            <div class="setting-card-body">
                <div class="field-group">
                    <label class="field-label" for="notice">앱 또는 안내판에 표시할 공지 내용</label>
                    <textarea class="field-input" id="notice" placeholder="예) 설날 연휴 휴무: 1월 28일 ~ 1월 30일&#10;회원권 이벤트 진행 중!" maxlength="1000" rows="4"></textarea>
                </div>
            </div>
        </div>

        <!-- Holiday settings -->
        <div class="setting-card">
            <div class="setting-card-header">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zm-7-9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                <span class="setting-card-title">휴일 설정</span>
            </div>
            <div class="setting-card-body">
                <!-- year nav -->
                <div class="holiday-year-nav">
                    <button onclick="changeHolidayYear(-1)">&#8249;</button>
                    <span id="holidayYearLabel"></span>
                    <button onclick="changeHolidayYear(1)">&#8250;</button>
                </div>
                <!-- add form -->
                <div class="holiday-toolbar">
                    <div class="field-group">
                        <label class="field-label">날짜</label>
                        <input type="date" class="field-input" id="hDate">
                    </div>
                    <div class="field-group">
                        <label class="field-label">이름</label>
                        <input type="text" class="field-input" id="hName" placeholder="예) 설날, 임시 점검" maxlength="100">
                    </div>
                    <div class="field-group" style="flex:0">
                        <label class="field-label">유형</label>
                        <div class="type-tabs">
                            <button class="type-tab active-public" id="tabPublic" onclick="selectHolidayType('PUBLIC')">공휴일</button>
                            <button class="type-tab" id="tabClosure" onclick="selectHolidayType('CLOSURE')">임시휴관</button>
                        </div>
                    </div>
                    <button class="btn btn-primary" style="height:37px;align-self:flex-end" onclick="addHoliday()">+ 추가</button>
                </div>
                <!-- list -->
                <div class="holiday-list" id="holidayList" style="margin-top:8px">
                    <p style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">로딩 중...</p>
                </div>
            </div>
        </div>

        <!-- Banner management -->
        <div class="setting-card">
            <div class="setting-card-header">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zm-5-7l-4 5-3-4-4 5h14l-3-6z"/></svg>
                <span class="setting-card-title">공지사항 배너 이미지</span>
                <span style="font-size:11px;color:var(--text-muted);margin-left:auto">앱 화면에 표시됩니다. 앱 개발팀이 연동 처리합니다.</span>
            </div>
            <div class="setting-card-body">
                <!-- upload zone -->
                <div class="banner-upload-zone" id="bannerUploadZone"
                     onclick="document.getElementById('bannerFileInput').click()"
                     ondragover="onBannerDragOver(event)"
                     ondragleave="onBannerDragLeave(event)"
                     ondrop="onBannerDrop(event)">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="36" height="36"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    <p>클릭하거나 이미지를 드래그하여 업로드</p>
                    <p class="upload-hint">JPG, PNG, GIF, WEBP · 최대 10MB</p>
                </div>
                <input type="file" id="bannerFileInput" accept="image/*" style="display:none" onchange="onBannerFileSelect(event)">
                <!-- title input (shown before upload) -->
                <div id="bannerTitleWrap" style="display:none;margin-top:10px">
                    <div class="field-group">
                        <label class="field-label">배너 제목 (선택)</label>
                        <div style="display:flex;gap:8px">
                            <input type="text" class="field-input" id="bannerTitleInput" placeholder="예) 6월 이벤트" maxlength="100">
                            <button class="btn btn-primary" onclick="confirmBannerUpload()">업로드</button>
                            <button class="btn btn-secondary" onclick="cancelBannerUpload()">취소</button>
                        </div>
                    </div>
                </div>
                <!-- banner grid -->
                <div class="banner-grid" id="bannerGrid" style="margin-top:4px"></div>
            </div>
        </div>

    </div><!-- /.settings-body -->
</main>

<script>
const DAYS = [
    { key: 'mon', label: '월', cls: '' },
    { key: 'tue', label: '화', cls: '' },
    { key: 'wed', label: '수', cls: '' },
    { key: 'thu', label: '목', cls: '' },
    { key: 'fri', label: '금', cls: '' },
    { key: 'sat', label: '토', cls: 'weekend' },
    { key: 'sun', label: '일', cls: 'sunday' },
];

let setting = {};

/* ── Init ── */
async function init() {
    try {
        const res = await fetch('/api/settings/gym');
        const json = await res.json();
        if (json.success) {
            setting = json.data || {};
            render();
        }
    } catch(e) {
        console.error(e);
    }
}

function render() {
    // Basic info
    document.getElementById('gymName').value    = setting.gymName    || '';
    document.getElementById('gymPhone').value   = setting.gymPhone   || '';
    document.getElementById('gymAddress').value = setting.gymAddress || '';
    document.getElementById('notice').value     = setting.notice     || '';

    // Toggle
    renderOpenState(setting.isOpen);
    document.getElementById('isOpenToggle').checked = !!setting.isOpen;

    // Hours table
    buildHoursTable();
}

function renderOpenState(isOpen) {
    const card = document.getElementById('openCard');
    const statusText = document.getElementById('openStatusText');
    const subText = document.getElementById('openSubText');
    const indicator = document.getElementById('openIndicator');
    const toggleLabel = document.getElementById('toggleLabel');

    card.className = 'open-card ' + (isOpen ? 'is-open' : 'is-closed');

    if (isOpen) {
        indicator.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>`;
        statusText.textContent = '현재 영업 중';
        subText.textContent    = '회원이 입장할 수 있습니다.';
        toggleLabel.textContent = '영업 중';
    } else {
        indicator.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z"/></svg>`;
        statusText.textContent = '현재 휴무';
        subText.textContent    = '오늘은 운영하지 않습니다.';
        toggleLabel.textContent = '휴무';
    }
}

/* ── Toggle open ── */
async function onToggleOpen(checked) {
    renderOpenState(checked);
    setting.isOpen = checked;
    try {
        await fetch('/api/settings/gym/open', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ isOpen: checked })
        });
    } catch(e) {
        console.error(e);
    }
}

/* ── Hours table ── */
function buildHoursTable() {
    const tbody = document.getElementById('hoursBody');
    tbody.innerHTML = '';
    DAYS.forEach(({ key, label, cls }) => {
        const open   = setting[key + 'Open']   || '06:00';
        const close  = setting[key + 'Close']  || '22:00';
        const closed = !!setting[key + 'Closed'];

        const tr = document.createElement('tr');
        if (closed) tr.classList.add('closed-row');
        tr.id = 'row-' + key;

        tr.innerHTML = `
            <td><span class="day-label ${cls}">${label}</span></td>
            <td><input type="time" class="time-input" id="${key}Open" value="${open}" ${closed ? 'disabled' : ''}></td>
            <td><span class="time-sep">~</span></td>
            <td><input type="time" class="time-input" id="${key}Close" value="${close}" ${closed ? 'disabled' : ''}></td>
            <td class="closed-cell" style="text-align:center">
                <label class="check-closed">
                    <input type="checkbox" id="${key}Closed" ${closed ? 'checked' : ''} onchange="onClosedChange('${key}', this.checked)">
                    <span class="check-box"></span>
                    휴무
                </label>
            </td>`;
        tbody.appendChild(tr);
    });
}

function onClosedChange(key, checked) {
    const row = document.getElementById('row-' + key);
    const openInput  = document.getElementById(key + 'Open');
    const closeInput = document.getElementById(key + 'Close');
    if (checked) {
        row.classList.add('closed-row');
        openInput.disabled  = true;
        closeInput.disabled = true;
    } else {
        row.classList.remove('closed-row');
        openInput.disabled  = false;
        closeInput.disabled = false;
    }
}

/* ── Save all ── */
async function saveAll() {
    const payload = {
        gymName:    document.getElementById('gymName').value.trim(),
        gymPhone:   document.getElementById('gymPhone').value.trim(),
        gymAddress: document.getElementById('gymAddress').value.trim(),
        isOpen:     document.getElementById('isOpenToggle').checked,
        notice:     document.getElementById('notice').value.trim(),
    };
    DAYS.forEach(({ key }) => {
        payload[key + 'Open']   = document.getElementById(key + 'Open').value  || '06:00';
        payload[key + 'Close']  = document.getElementById(key + 'Close').value || '22:00';
        payload[key + 'Closed'] = document.getElementById(key + 'Closed').checked;
    });

    const result = document.getElementById('saveResult');
    try {
        const res = await fetch('/api/settings/gym', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const json = await res.json();
        if (json.success) {
            setting = { ...setting, ...payload };
            showResult(true, '저장되었습니다.');
        } else {
            showResult(false, '저장 실패: ' + (json.message || ''));
        }
    } catch(e) {
        showResult(false, '네트워크 오류가 발생했습니다.');
    }
}

function showResult(ok, msg) {
    const el = document.getElementById('saveResult');
    el.textContent = (ok ? '✓ ' : '✕ ') + msg;
    el.className = 'save-result show ' + (ok ? 'ok' : 'err');
    setTimeout(() => el.classList.remove('show'), 3000);
}

/* ── Sidebar mobile ── */
function openSidebar()  { document.querySelector('.sidebar').classList.add('open');    document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar() { document.querySelector('.sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }

// ═══════════════════════════════════════════
// 휴일 설정
// ═══════════════════════════════════════════
let holidayYear = new Date().getFullYear();
let selectedHolidayType = 'PUBLIC';

function changeHolidayYear(delta) {
    holidayYear += delta;
    document.getElementById('holidayYearLabel').textContent = holidayYear + '년';
    loadHolidays();
}

function selectHolidayType(type) {
    selectedHolidayType = type;
    document.getElementById('tabPublic').className  = 'type-tab' + (type === 'PUBLIC'  ? ' active-public'  : '');
    document.getElementById('tabClosure').className = 'type-tab' + (type === 'CLOSURE' ? ' active-closure' : '');
}

async function loadHolidays() {
    const res  = await fetch(`/api/settings/holidays?year=${holidayYear}`);
    const json = await res.json();
    renderHolidayList(json.data || []);
}

function renderHolidayList(list) {
    const el = document.getElementById('holidayList');
    if (!list.length) {
        el.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">${holidayYear}년 등록된 휴일이 없습니다.</p>`;
        return;
    }
    const typeLabel = { PUBLIC: '공휴일', CLOSURE: '임시휴관' };
    el.innerHTML = list.map(h => `
        <div class="holiday-item">
            <span class="h-date">${h.holidayDate}</span>
            <span class="h-name">${h.name}</span>
            <span class="h-type ${h.type}">${typeLabel[h.type] || h.type}</span>
            <button class="btn btn-secondary" style="padding:3px 9px;font-size:11px;color:var(--error)"
                onclick="deleteHoliday(${h.id}, '${h.name}')">삭제</button>
        </div>`).join('');
}

async function addHoliday() {
    const date = document.getElementById('hDate').value;
    const name = document.getElementById('hName').value.trim();
    if (!date) { alert('날짜를 선택해주세요.'); return; }
    if (!name) { alert('휴일 이름을 입력해주세요.'); return; }

    const res = await fetch('/api/settings/holidays', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ holidayDate: date, type: selectedHolidayType, name })
    });
    const json = await res.json();
    if (!json.success) { alert('추가 실패: ' + (json.message || '')); return; }
    document.getElementById('hDate').value = '';
    document.getElementById('hName').value = '';
    loadHolidays();
}

async function deleteHoliday(id, name) {
    if (!confirm(`"${name}" 휴일을 삭제하시겠습니까?`)) return;
    await fetch(`/api/settings/holidays/${id}`, { method: 'DELETE' });
    loadHolidays();
}

// ═══════════════════════════════════════════
// 배너 관리
// ═══════════════════════════════════════════
let pendingBannerFile = null;

async function loadBanners() {
    const res  = await fetch('/api/settings/banners');
    const json = await res.json();
    renderBannerGrid(json.data || []);
}

function renderBannerGrid(list) {
    const grid = document.getElementById('bannerGrid');
    if (!list.length) { grid.innerHTML = ''; return; }
    grid.innerHTML = list.map(b => `
        <div class="banner-card ${b.active ? '' : 'banner-inactive'}">
            ${!b.active ? '<span class="banner-inactive-badge">비활성</span>' : ''}
            <img src="${b.imageUrl}" alt="${b.title || '배너'}" loading="lazy"
                 onerror="this.style.background='var(--surface-up)';this.removeAttribute('src')">
            <div class="banner-card-body">
                <span class="banner-card-title">${b.title || '제목 없음'}</span>
                <button class="btn btn-secondary" style="padding:3px 8px;font-size:11px"
                    onclick="toggleBannerActive(${b.id}, ${b.active})">${b.active ? '비활성화' : '활성화'}</button>
                <button class="btn btn-secondary" style="padding:3px 8px;font-size:11px;color:var(--error)"
                    onclick="deleteBanner(${b.id})">삭제</button>
            </div>
        </div>`).join('');
}

function onBannerDragOver(e) {
    e.preventDefault();
    document.getElementById('bannerUploadZone').classList.add('drag-over');
}
function onBannerDragLeave(e) {
    document.getElementById('bannerUploadZone').classList.remove('drag-over');
}
function onBannerDrop(e) {
    e.preventDefault();
    document.getElementById('bannerUploadZone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) prepareBannerUpload(file);
}
function onBannerFileSelect(e) {
    const file = e.target.files[0];
    if (file) prepareBannerUpload(file);
    e.target.value = '';
}

function prepareBannerUpload(file) {
    pendingBannerFile = file;
    document.getElementById('bannerTitleInput').value = file.name.replace(/\.[^.]+$/, '');
    document.getElementById('bannerTitleWrap').style.display = '';
}

function cancelBannerUpload() {
    pendingBannerFile = null;
    document.getElementById('bannerTitleWrap').style.display = 'none';
    document.getElementById('bannerTitleInput').value = '';
}

async function confirmBannerUpload() {
    if (!pendingBannerFile) return;
    const title = document.getElementById('bannerTitleInput').value.trim();
    const fd = new FormData();
    fd.append('file', pendingBannerFile);
    fd.append('title', title);
    const res  = await fetch('/api/settings/banners', { method: 'POST', body: fd });
    const json = await res.json();
    if (!json.success) { alert('업로드 실패: ' + (json.message || '')); return; }
    cancelBannerUpload();
    loadBanners();
}

async function toggleBannerActive(id, currentActive) {
    await fetch(`/api/settings/banners/${id}/active`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ isActive: !currentActive })
    });
    loadBanners();
}

async function deleteBanner(id) {
    if (!confirm('배너를 삭제하시겠습니까?')) return;
    await fetch(`/api/settings/banners/${id}`, { method: 'DELETE' });
    loadBanners();
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
document.getElementById('holidayYearLabel').textContent = holidayYear + '년';
init();
loadHolidays();
loadBanners();
</script>

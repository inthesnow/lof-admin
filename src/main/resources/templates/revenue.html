<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK_Fit Admin — 매출 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        .period-tabs { display:flex; background:var(--surface-up); border-radius:8px; padding:3px; gap:2px; }
        .period-tab { padding:5px 14px; border-radius:6px; border:none; background:transparent; color:var(--text-muted); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; }
        .period-tab.active { background:var(--accent); color:var(--bg); font-weight:700; }

        .date-nav { display:flex; align-items:center; gap:8px; }
        .date-btn { background:var(--surface-up); border:1px solid var(--border); color:var(--text-secondary); width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:background 0.15s; }
        .date-btn:hover { background:var(--border); color:var(--text-primary); }
        .date-label { font-size:13px; font-weight:600; min-width:120px; text-align:center; }

        .revenue-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; padding:20px 24px; border-bottom:1px solid var(--border); }
        .summary-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; }
        .summary-label { font-size:12px; color:var(--text-muted); margin-bottom:6px; }
        .summary-value { font-size:22px; font-weight:700; color:var(--success); }

        .revenue-section { padding:20px 24px; }
        .revenue-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:10px; overflow:hidden; }
        .revenue-item-header { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; transition:background 0.15s; }
        .revenue-item-header:hover { background:var(--surface-up); }
        .rev-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:color-mix(in srgb,var(--success) 15%,transparent); color:var(--success); flex-shrink:0; }
        .rev-label { flex:1; font-size:14px; font-weight:500; }
        .rev-amount { font-size:16px; font-weight:700; color:var(--text-primary); }
        .rev-expand { background:none; border:none; color:var(--text-muted); font-size:12px; cursor:pointer; padding:4px 8px; border-radius:6px; transition:all 0.15s; display:flex; align-items:center; gap:4px; }
        .rev-expand:hover { color:var(--accent); }
        .rev-expand svg { transition:transform 0.2s; }
        .rev-expand.expanded svg { transform:rotate(180deg); }

        .expand-panel { max-height:0; overflow:hidden; transition:max-height 0.3s ease; background:var(--surface-up); border-top:1px solid var(--border); }
        .expand-panel.open { max-height:400px; }
        .expand-inner { padding:14px 16px 14px 64px; }
        .expand-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; color:var(--text-secondary); }
        .expand-row:last-child { border-bottom:none; }
        .expand-row b { color:var(--text-primary); }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('revenue')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">매출 관리</h1>
            <div class="date-nav">
                <button class="date-btn" onclick="moveDate(-1)">&#8249;</button>
                <span class="date-label" id="dateLabel"></span>
                <button class="date-btn" onclick="moveDate(1)">&#8250;</button>
            </div>
        </div>
        <div class="header-right">
            <div class="period-tabs">
                <button class="period-tab active" onclick="setPeriod('daily', this)">일간</button>
                <button class="period-tab" onclick="setPeriod('weekly', this)">주간</button>
                <button class="period-tab" onclick="setPeriod('monthly', this)">월간</button>
            </div>
        </div>
    </header>

    <div class="revenue-summary">
        <div class="summary-card">
            <div class="summary-label">총 매출</div>
            <div class="summary-value" id="totalRevenue">0원</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">건수</div>
            <div class="summary-value" style="color:var(--accent)" id="totalCount">0건</div>
        </div>
        <div class="summary-card">
            <div class="summary-label">전일 대비</div>
            <div class="summary-value" style="color:var(--text-muted)" id="comparison">-</div>
        </div>
    </div>

    <div class="revenue-section">
        <div class="revenue-item" id="rev-membership">
            <div class="revenue-item-header" onclick="toggleExpand('membership')">
                <div class="rev-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
                </div>
                <span class="rev-label">등록/재등록 매출</span>
                <span class="rev-amount" id="amt-membership">0원</span>
                <button class="rev-expand" id="btn-membership">
                    펼치기
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M7 10l5 5 5-5z"/></svg>
                </button>
            </div>
            <div class="expand-panel" id="panel-membership">
                <div class="expand-inner" id="detail-membership">
                    <div class="expand-row"><span>로딩 중...</span></div>
                </div>
            </div>
        </div>

        <div class="revenue-item" id="rev-group-classes">
            <div class="revenue-item-header" onclick="toggleExpand('group-classes')">
                <div class="rev-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                </div>
                <span class="rev-label">그룹 수업 매출</span>
                <span class="rev-amount" id="amt-group-classes">0원</span>
                <button class="rev-expand" id="btn-group-classes">
                    펼치기
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M7 10l5 5 5-5z"/></svg>
                </button>
            </div>
            <div class="expand-panel" id="panel-group-classes">
                <div class="expand-inner" id="detail-group-classes"></div>
            </div>
        </div>

        <div class="revenue-item" id="rev-pt">
            <div class="revenue-item-header" onclick="toggleExpand('pt')">
                <div class="rev-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
                </div>
                <span class="rev-label">개인 레슨 매출</span>
                <span class="rev-amount" id="amt-pt">0원</span>
                <button class="rev-expand" id="btn-pt">
                    펼치기
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M7 10l5 5 5-5z"/></svg>
                </button>
            </div>
            <div class="expand-panel" id="panel-pt">
                <div class="expand-inner" id="detail-pt"></div>
            </div>
        </div>

        <div class="revenue-item" id="rev-lockers">
            <div class="revenue-item-header" onclick="toggleExpand('lockers')">
                <div class="rev-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.34 0-2.12-2.46-3.66-5-3.66-1.38 0-2.74.594-3.66 1.62L8 4 6.66 2.62C5.74 1.594 4.38 1 3 1 .54 1 0 2.54 0 4.66c0 .46.06.9.18 1.34H-2v14h24V6zm-8 8H8v-2h4v2zm0-4H8V8h4v2zm4 4h-2v-2h2v2zm0-4h-2V8h2v2z"/></svg>
                </div>
                <span class="rev-label">락커 매출</span>
                <span class="rev-amount" id="amt-lockers">0원</span>
                <button class="rev-expand" id="btn-lockers">
                    펼치기
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M7 10l5 5 5-5z"/></svg>
                </button>
            </div>
            <div class="expand-panel" id="panel-lockers">
                <div class="expand-inner" id="detail-lockers"></div>
            </div>
        </div>

        <div class="revenue-item" id="rev-items">
            <div class="revenue-item-header" onclick="toggleExpand('items')">
                <div class="rev-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 7H5c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-8 8H9v-2h2v2zm0-4H9V9h2v2zm4 4h-2v-2h2v2zm0-4h-2V9h2v2z"/></svg>
                </div>
                <span class="rev-label">공동 물품 매출</span>
                <span class="rev-amount" id="amt-items">0원</span>
                <button class="rev-expand" id="btn-items">
                    펼치기
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M7 10l5 5 5-5z"/></svg>
                </button>
            </div>
            <div class="expand-panel" id="panel-items">
                <div class="expand-inner" id="detail-items"></div>
            </div>
        </div>
    </div>
</main>

<script>
let currentDate = new Date();
let currentPeriod = 'daily';

function formatDate(d) {
    return d.toISOString().split('T')[0];
}

function updateDateLabel() {
    const label = document.getElementById('dateLabel');
    if (currentPeriod === 'daily') {
        label.textContent = `${currentDate.getFullYear()}년 ${String(currentDate.getMonth()+1).padStart(2,'0')}월 ${String(currentDate.getDate()).padStart(2,'0')}일`;
    } else if (currentPeriod === 'weekly') {
        const start = new Date(currentDate);
        start.setDate(start.getDate() - start.getDay());
        const end = new Date(start); end.setDate(end.getDate() + 6);
        label.textContent = `${formatDate(start)} ~ ${formatDate(end)}`;
    } else {
        label.textContent = `${currentDate.getFullYear()}년 ${String(currentDate.getMonth()+1).padStart(2,'0')}월`;
    }
}

function moveDate(dir) {
    if (currentPeriod === 'daily') currentDate.setDate(currentDate.getDate() + dir);
    else if (currentPeriod === 'weekly') currentDate.setDate(currentDate.getDate() + dir * 7);
    else currentDate.setMonth(currentDate.getMonth() + dir);
    updateDateLabel();
    loadRevenue();
}

function setPeriod(period, btn) {
    currentPeriod = period;
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    updateDateLabel();
    loadRevenue();
}

async function loadRevenue() {
    const date = formatDate(currentDate);
    const res = await fetch(`/api/revenue/summary?date=${date}&period=${currentPeriod}`);
    const json = await res.json();
    const d = json.data;

    const total = (d.membership||0) + (d.groupClass||0) + (d.pt||0) + (d.locker||0) + (d.items||0);
    document.getElementById('totalRevenue').textContent = total.toLocaleString() + '원';
    document.getElementById('totalCount').textContent = '0건';
    document.getElementById('comparison').textContent = '-';

    ['membership','group-classes','pt','lockers','items'].forEach((key, i) => {
        const val = [d.membership, d.groupClass, d.pt, d.locker, d.items][i] || 0;
        document.getElementById('amt-' + key).textContent = val.toLocaleString() + '원';
    });
}

async function toggleExpand(category) {
    const panel = document.getElementById('panel-' + category);
    const btn = document.getElementById('btn-' + category);
    const isOpen = panel.classList.contains('open');

    if (!isOpen) {
        const date = formatDate(currentDate);
        const res = await fetch(`/api/dashboard/revenue/${category}?date=${date}&period=${currentPeriod}`);
        const json = await res.json();
        const detail = document.getElementById('detail-' + category);
        detail.innerHTML = json.data.items && json.data.items.length
            ? json.data.items.map(item => `<div class="expand-row"><span>${item.name || '-'}</span><b>${(item.amount||0).toLocaleString()}원</b></div>`).join('')
            : '<div class="expand-row"><span style="color:var(--text-muted)">데이터가 없습니다.</span></div>';
    }

    panel.classList.toggle('open', !isOpen);
    btn.classList.toggle('expanded', !isOpen);
    btn.childNodes[0].textContent = !isOpen ? '접기 ' : '펼치기 ';
}

function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

updateDateLabel();
loadRevenue();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>링크온핏 CRM — 구독권/티켓 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('feedback')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">구독권/티켓 관리</h1>
        </div>
    </header>

    <!-- 상품 요약 카드 (5개) -->
    <div class="product-cards-row" id="productCardsRow">
        <div class="product-card sub-card" onclick="openSubModal('LIGHT_FIT')">
            <div class="product-card-label">라이트핏</div>
            <div class="product-card-val" id="cntLightFit">-</div>
            <div class="product-card-unit">명 보유</div>
            <button class="btn btn-primary product-card-btn" onclick="event.stopPropagation();openSubModal('LIGHT_FIT')">구매</button>
        </div>
        <div class="product-card sub-card" onclick="openSubModal('REGULAR_FIT')">
            <div class="product-card-label">레귤러핏</div>
            <div class="product-card-val" id="cntRegularFit">-</div>
            <div class="product-card-unit">명 보유</div>
            <button class="btn btn-primary product-card-btn" onclick="event.stopPropagation();openSubModal('REGULAR_FIT')">구매</button>
        </div>
        <div class="product-card sub-card" onclick="openSubModal('INTENSIVE_FIT')">
            <div class="product-card-label">인텐시브핏</div>
            <div class="product-card-val" id="cntIntensiveFit">-</div>
            <div class="product-card-unit">명 보유</div>
            <button class="btn btn-primary product-card-btn" onclick="event.stopPropagation();openSubModal('INTENSIVE_FIT')">구매</button>
        </div>
        <div class="product-card ticket-card" onclick="openChargeModal(null,'ONE_POINT')">
            <div class="product-card-label">원포인트카드</div>
            <div class="product-card-val" id="cntOnePoint">-</div>
            <div class="product-card-unit">장 보유</div>
            <button class="btn btn-secondary product-card-btn" onclick="event.stopPropagation();openChargeModal(null,'ONE_POINT')">지급</button>
        </div>
        <div class="product-card ticket-card" onclick="openChargeModal(null,'FEEDBACK')">
            <div class="product-card-label">피드백티켓</div>
            <div class="product-card-val" id="cntFeedback">-</div>
            <div class="product-card-unit">장 보유</div>
            <button class="btn btn-secondary product-card-btn" onclick="event.stopPropagation();openChargeModal(null,'FEEDBACK')">지급</button>
        </div>
    </div>

    <!-- 탭 네비게이션 -->
    <div style="display:flex;border-bottom:1px solid var(--border);padding:0 24px">
        <button id="tabSub"    class="page-tab active" onclick="switchTab('sub')">구독권 현황</button>
        <button id="tabTicket" class="page-tab"        onclick="switchTab('ticket')">티켓 현황</button>
    </div>

    <!-- 구독권 탭 -->
    <div id="paneSub">
        <div class="search-bar">
            <select class="filter-select" id="tierFilter" onchange="subPage=0;loadSubs()">
                <option value="">전체 구독권</option>
                <option value="LIGHT_FIT">라이트핏</option>
                <option value="REGULAR_FIT">레귤러핏</option>
                <option value="INTENSIVE_FIT">인텐시브핏</option>
            </select>
            <input type="text" class="search-input" id="subKeyword" placeholder="회원명 검색" onkeyup="if(event.key==='Enter'){subPage=0;loadSubs()}">
            <button class="btn btn-secondary" onclick="subPage=0;loadSubs()">조회</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>회원명</th>
                        <th>전화번호</th>
                        <th>구독권</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="subTableBody">
                    <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="subPagination"></div>
    </div>

    <!-- 티켓 탭 -->
    <div id="paneTicket" style="display:none">
        <div class="search-bar">
            <input type="text" class="search-input" id="ticketKeyword" placeholder="회원명 검색" onkeyup="if(event.key==='Enter'){ticketPage=0;loadTickets()}">
            <button class="btn btn-secondary" onclick="ticketPage=0;loadTickets()">조회</button>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);cursor:pointer;margin-left:4px">
                <input type="checkbox" id="lowStockFilter" onchange="ticketPage=0;loadTickets()">
                잔량 5장 미만만 보기
            </label>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>회원명</th>
                        <th>전화번호</th>
                        <th>원포인트카드</th>
                        <th>피드백티켓</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="ticketTableBody">
                    <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="ticketPagination"></div>
    </div>
</main>

<!-- 구독권 지급 모달 -->
<div class="modal-overlay" id="subModal">
    <div class="modal" style="max-width:480px">
        <div class="modal-header">
            <span class="modal-title">구독권 지급</span>
            <button class="modal-close" onclick="closeSubModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">회원 검색</label>
                <div style="display:flex;gap:8px">
                    <input type="text" class="form-input" id="subMemberKeyword" placeholder="회원명 입력 후 검색">
                    <button class="btn btn-secondary" style="white-space:nowrap" onclick="searchSubMember()">검색</button>
                </div>
                <div id="subMemberResults" style="margin-top:6px;border:1px solid var(--border);border-radius:6px;max-height:160px;overflow-y:auto;display:none"></div>
                <div id="subMemberSelected" style="margin-top:6px;padding:8px 12px;background:var(--surface-up);border-radius:6px;font-size:13px;display:none"></div>
            </div>
            <div class="form-group">
                <label class="form-label">구독권 종류</label>
                <select class="form-select" id="subType">
                    <option value="LIGHT_FIT">라이트핏</option>
                    <option value="REGULAR_FIT">레귤러핏</option>
                    <option value="INTENSIVE_FIT">인텐시브핏</option>
                </select>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">개월 수 (장)</label>
                    <input type="number" class="form-input" id="subMonths" min="1" max="24" value="1" oninput="calcSubEndDate()">
                </div>
                <div class="form-group">
                    <label class="form-label">시작일</label>
                    <input type="date" class="form-input" id="subStartDate" oninput="calcSubEndDate()">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">종료일 (자동 계산)</label>
                <input type="date" class="form-input" id="subEndDate" readonly style="background:var(--surface-up)">
            </div>
            <div class="form-group">
                <label class="form-label">금액 (원)</label>
                <input type="number" class="form-input" id="subPrice" min="0" value="0" placeholder="0">
            </div>
            <div class="form-group">
                <label class="form-label">메모</label>
                <input type="text" class="form-input" id="subMemo" placeholder="지급 사유 (선택)">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeSubModal()">취소</button>
            <button class="btn btn-primary" onclick="grantSub()">지급</button>
        </div>
    </div>
</div>

<!-- 티켓 충전 모달 -->
<div class="modal-overlay" id="chargeModal">
    <div class="modal" style="max-width:420px">
        <div class="modal-header">
            <span class="modal-title">티켓 지급/충전</span>
            <button class="modal-close" onclick="closeChargeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group" id="chargeSearchGroup">
                <label class="form-label">회원 검색</label>
                <div style="display:flex;gap:8px">
                    <input type="text" class="form-input" id="chargeMemberKeyword" placeholder="회원명 입력 후 검색">
                    <button class="btn btn-secondary" style="white-space:nowrap" onclick="searchChargeMember()">검색</button>
                </div>
                <div id="chargeMemberResults" style="margin-top:6px;border:1px solid var(--border);border-radius:6px;max-height:160px;overflow-y:auto;display:none"></div>
            </div>
            <div class="form-group">
                <label class="form-label">대상 회원</label>
                <div id="chargeTargetDisplay" style="padding:8px 12px;background:var(--surface-up);border-radius:6px;font-size:13px;color:var(--text-muted)">선택된 회원 없음</div>
            </div>
            <div class="form-group">
                <label class="form-label">티켓 종류</label>
                <select class="form-select" id="chargeType">
                    <option value="ONE_POINT">원포인트카드</option>
                    <option value="FEEDBACK">피드백티켓</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">장수</label>
                <input type="number" class="form-input" id="chargeAmount" min="1" value="1">
            </div>
            <div class="form-group">
                <label class="form-label">메모</label>
                <input type="text" class="form-input" id="chargeMemo" placeholder="지급 사유 (선택)">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeChargeModal()">취소</button>
            <button class="btn btn-primary" onclick="chargeTicket()">충전</button>
        </div>
    </div>
</div>

<style>
.product-cards-row {
    display: flex; gap: 12px; padding: 20px 24px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
}
.product-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 20px; min-width: 140px; flex: 1; text-align: center;
    cursor: pointer; transition: box-shadow .15s;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.product-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.product-card-label { font-size: 12px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.product-card-val { font-size: 28px; font-weight: 700; margin: 2px 0; }
.product-card-unit { font-size: 11px; color: var(--text-muted); }
.product-card-btn { margin-top: 10px; padding: 5px 16px; font-size: 12px; }
.sub-card .product-card-val { color: var(--accent); }
.ticket-card .product-card-val { color: var(--success); }
.page-tab {
    background: none; border: none; padding: 12px 20px; cursor: pointer;
    color: var(--text-secondary); font-size: 14px; border-bottom: 2px solid transparent;
}
.page-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.ticket-badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 13px; font-weight: 600;
}
.ticket-ok   { background: color-mix(in srgb,#3FB950 15%,transparent); color: #1A7F37; }
.ticket-low  { background: color-mix(in srgb,#D29922 15%,transparent); color: #9A6700; }
.ticket-zero { background: color-mix(in srgb,#F85149 15%,transparent); color: #CF222E; }
.member-result-item {
    padding: 8px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border);
}
.member-result-item:last-child { border-bottom: none; }
.member-result-item:hover { background: var(--surface-up); }
</style>

<script>
let subPage = 0, ticketPage = 0;
const pageSize = 20;
let activeTab = 'sub';
let subTargetMemberId = null, subTargetMemberName = null;
let chargeTargetMemberId = null, chargeTargetMemberName = null;

const tierLabel = { BASIC: '기본', LIGHT_FIT: '라이트핏', REGULAR_FIT: '레귤러핏', INTENSIVE_FIT: '인텐시브핏' };
const tierBadge = { BASIC: 'badge-pending', LIGHT_FIT: 'badge-active', REGULAR_FIT: 'badge-admin', INTENSIVE_FIT: 'badge-super' };

function csrfHeaders() { return { 'Content-Type': 'application/json' }; }

// ── 상품 카드 요약 로드 ────────────────────────────────────────

async function loadProductSummary() {
    const tiers = ['LIGHT_FIT', 'REGULAR_FIT', 'INTENSIVE_FIT'];
    const ids   = ['cntLightFit', 'cntRegularFit', 'cntIntensiveFit'];
    const promises = tiers.map(t => fetch(`/api/members?tier=${t}&page=0&size=1`).then(r => r.json()));
    const results = await Promise.allSettled(promises);
    results.forEach((r, i) => {
        if (r.status === 'fulfilled' && r.value.success) {
            document.getElementById(ids[i]).textContent = r.value.data?.total ?? '-';
        }
    });

    // FEEDBACK/ONE_POINT 총 잔량: 활성 회원 샘플 집계 (100명 기준)
    loadTicketTotals();
}

async function loadTicketTotals() {
    try {
        const res  = await fetch(`/api/members?status=ACTIVE&page=0&size=100`);
        const json = await res.json();
        if (!json.success || !json.data?.members) return;
        const members = json.data.members;
        const results = await Promise.allSettled(
            members.map(m => fetch(`/api/members/${m.id}/tickets`).then(r => r.json()))
        );
        let opTotal = 0, fbTotal = 0;
        results.forEach(r => {
            if (r.status === 'fulfilled' && r.value.success) {
                const list = r.value.data || [];
                opTotal += list.find(t => t.ticketType === 'ONE_POINT')?.remaining || 0;
                fbTotal += list.find(t => t.ticketType === 'FEEDBACK')?.remaining  || 0;
            }
        });
        document.getElementById('cntOnePoint').textContent = opTotal;
        document.getElementById('cntFeedback').textContent = fbTotal;
    } catch (e) {}
}

// ── 탭 전환 ──────────────────────────────────────────────────

function switchTab(tab) {
    activeTab = tab;
    ['sub', 'ticket'].forEach(t => {
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
        document.getElementById('pane' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? '' : 'none';
    });
    if (tab === 'sub')    loadSubs();
    if (tab === 'ticket') loadTickets();
}

// ── 구독권 탭 ─────────────────────────────────────────────────

async function loadSubs() {
    const tier    = document.getElementById('tierFilter').value;
    const keyword = document.getElementById('subKeyword').value;
    const tierParam = tier || 'LIGHT_FIT,REGULAR_FIT,INTENSIVE_FIT';

    // tier 필터가 없을 때 3개 티어 모두 조회 (OR 조건)
    // members API는 단일 tier만 지원하므로 전체 로드 후 필터링
    try {
        let url;
        if (tier) {
            url = `/api/members?keyword=${encodeURIComponent(keyword)}&tier=${tier}&page=${subPage}&size=${pageSize}`;
        } else {
            // 전체 구독 회원: LIGHT_FIT, REGULAR_FIT, INTENSIVE_FIT 순차 조회 후 합산
            // 간단히: tier='' 로 전체 회원 조회 후 클라이언트 필터링
            url = `/api/members?keyword=${encodeURIComponent(keyword)}&page=${subPage}&size=${pageSize}`;
        }
        const res  = await fetch(url);
        const json = await res.json();
        let members = json.data?.members || [];
        let total   = json.data?.total   || 0;
        if (!tier) {
            members = members.filter(m => ['LIGHT_FIT','REGULAR_FIT','INTENSIVE_FIT'].includes(m.tier));
            total   = members.length;
        }
        renderSubTable(members, total);
    } catch(e) {}
}

function renderSubTable(members, total) {
    const tbody = document.getElementById('subTableBody');
    if (!members.length) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">구독권 보유 회원이 없습니다.</td></tr>`;
        renderPagination('subPagination', total, subPage, i => { subPage = i; loadSubs(); });
        return;
    }
    tbody.innerHTML = members.map(m => `
        <tr>
            <td style="font-weight:500">${escHtml(m.name || m.id)}</td>
            <td>${m.phone || '-'}</td>
            <td><span class="badge ${tierBadge[m.tier] || 'badge-pending'}">${tierLabel[m.tier] || m.tier || '-'}</span></td>
            <td><span class="badge ${m.status === 'ACTIVE' ? 'badge-active' : 'badge-expired'}">${m.status === 'ACTIVE' ? '이용중' : m.status || '-'}</span></td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-primary" style="padding:5px 10px;font-size:12px"
                        onclick="openSubModalForMember('${m.id}','${escHtml(m.name||m.id)}')">구독권 지급</button>
            </td>
        </tr>`).join('');
    renderPagination('subPagination', total, subPage, i => { subPage = i; loadSubs(); });
}

// ── 티켓 탭 ──────────────────────────────────────────────────

async function loadTickets() {
    const keyword  = document.getElementById('ticketKeyword').value;
    const lowStock = document.getElementById('lowStockFilter').checked;
    try {
        const res   = await fetch(`/api/members?keyword=${encodeURIComponent(keyword)}&status=ACTIVE&page=${ticketPage}&size=${pageSize}`);
        const json  = await res.json();
        const members = json.data?.members || [];
        const total   = json.data?.total   || 0;

        // 각 회원의 원포인트/피드백 티켓 병렬 로드
        const ticketResults = await Promise.allSettled(
            members.map(m => fetch(`/api/members/${m.id}/tickets`).then(r => r.json()))
        );
        const items = members.map((m, i) => {
            const tRes = ticketResults[i];
            let op = 0, fb = 0;
            if (tRes.status === 'fulfilled' && tRes.value.success) {
                const list = tRes.value.data || [];
                op = list.find(t => t.ticketType === 'ONE_POINT')?.remaining ?? 0;
                fb = list.find(t => t.ticketType === 'FEEDBACK')?.remaining ?? 0;
            }
            return { memberId: m.id, memberName: m.name, memberPhone: m.phone, onePoint: op, feedback: fb };
        });

        const filtered = lowStock ? items.filter(m => m.onePoint < 5 || m.feedback < 5) : items;
        renderTicketTable(filtered, total);
    } catch(e) {}
}

function renderTicketTable(items, total) {
    const tbody = document.getElementById('ticketTableBody');
    if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">데이터가 없습니다.</td></tr>`;
        renderPagination('ticketPagination', total, ticketPage, i => { ticketPage = i; loadTickets(); });
        return;
    }
    tbody.innerHTML = items.map(m => {
        const op = m.onePoint || 0;
        const fb = m.feedback || 0;
        const opCls = op === 0 ? 'ticket-zero' : op < 5 ? 'ticket-low' : 'ticket-ok';
        const fbCls = fb === 0 ? 'ticket-zero' : fb < 5 ? 'ticket-low' : 'ticket-ok';
        return `<tr>
            <td style="font-weight:500">${escHtml(m.memberName || m.memberId)}</td>
            <td>${m.memberPhone || '-'}</td>
            <td><span class="ticket-badge ${opCls}">${op}장</span></td>
            <td><span class="ticket-badge ${fbCls}">${fb}장</span></td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-primary"   style="padding:5px 10px;font-size:12px"
                        onclick="openChargeModal('${m.memberId}','ONE_POINT','${escHtml(m.memberName||m.memberId)}')">원포인트</button>
                <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px"
                        onclick="openChargeModal('${m.memberId}','FEEDBACK','${escHtml(m.memberName||m.memberId)}')">피드백</button>
            </td>
        </tr>`;
    }).join('');
    renderPagination('ticketPagination', total, ticketPage, i => { ticketPage = i; loadTickets(); });
}

// ── 구독권 지급 모달 ──────────────────────────────────────────

function openSubModal(tierDefault) {
    subTargetMemberId = null;
    subTargetMemberName = null;
    document.getElementById('subMemberKeyword').value = '';
    document.getElementById('subMemberResults').style.display = 'none';
    document.getElementById('subMemberSelected').style.display = 'none';
    document.getElementById('subType').value = tierDefault || 'LIGHT_FIT';
    document.getElementById('subMonths').value = '1';
    document.getElementById('subPrice').value = '0';
    document.getElementById('subMemo').value = '';
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('subStartDate').value = today;
    calcSubEndDate();
    document.getElementById('subModal').classList.add('open');
}

function openSubModalForMember(memberId, memberName) {
    openSubModal('LIGHT_FIT');
    subTargetMemberId = memberId;
    subTargetMemberName = memberName;
    const sel = document.getElementById('subMemberSelected');
    sel.textContent = memberName;
    sel.style.display = '';
}

function closeSubModal() { document.getElementById('subModal').classList.remove('open'); }

async function searchSubMember() {
    const kw = document.getElementById('subMemberKeyword').value.trim();
    if (!kw) return;
    const res  = await fetch(`/api/members?keyword=${encodeURIComponent(kw)}&page=0&size=10`);
    const json = await res.json();
    const list  = json.data?.members || [];
    const el    = document.getElementById('subMemberResults');
    if (!list.length) {
        el.innerHTML = `<div style="padding:10px 12px;font-size:13px;color:var(--text-muted)">검색 결과 없음</div>`;
    } else {
        el.innerHTML = list.map(m => `
            <div class="member-result-item" onclick="selectSubMember('${m.id}','${escHtml(m.name||m.id)}')">
                ${escHtml(m.name || m.id)}
                ${m.phone ? `<span style="color:var(--text-muted);margin-left:8px;font-size:12px">${m.phone}</span>` : ''}
            </div>`).join('');
    }
    el.style.display = '';
}

function selectSubMember(id, name) {
    subTargetMemberId   = id;
    subTargetMemberName = name;
    const sel = document.getElementById('subMemberSelected');
    sel.textContent = name;
    sel.style.display = '';
    document.getElementById('subMemberResults').style.display = 'none';
    document.getElementById('subMemberKeyword').value = '';
}

function calcSubEndDate() {
    const start  = document.getElementById('subStartDate').value;
    const months = parseInt(document.getElementById('subMonths').value) || 1;
    if (!start) { document.getElementById('subEndDate').value = ''; return; }
    const d = new Date(start);
    d.setMonth(d.getMonth() + months);
    d.setDate(d.getDate() - 1);
    document.getElementById('subEndDate').value = d.toISOString().split('T')[0];
}

async function grantSub() {
    if (!subTargetMemberId) { alert('회원을 선택해주세요.'); return; }
    const tier      = document.getElementById('subType').value;
    const months    = parseInt(document.getElementById('subMonths').value) || 1;
    const startDate = document.getElementById('subStartDate').value;
    const endDate   = document.getElementById('subEndDate').value;
    const price     = parseInt(document.getElementById('subPrice').value) || 0;
    const memo      = document.getElementById('subMemo').value || `${tierLabel[tier]} ${months}개월 지급`;

    if (!startDate || !endDate) { alert('시작일을 입력해주세요.'); return; }

    const res = await fetch(`/api/members/${subTargetMemberId}/memberships`, {
        method: 'POST', headers: csrfHeaders(),
        body: JSON.stringify({ type: 'MEMBERSHIP', startDate, endDate, price, memo })
    });
    const json = await res.json();
    if (json.success !== false) {
        // 티어 업데이트
        await fetch(`/api/members/${subTargetMemberId}/tier`, {
            method: 'PATCH', headers: csrfHeaders(),
            body: JSON.stringify({ tier })
        });
        closeSubModal();
        loadProductSummary();
        loadSubs();
        alert(`${subTargetMemberName}에게 ${tierLabel[tier]} ${months}개월 지급 완료`);
    } else {
        alert(json.message || '지급에 실패했습니다.');
    }
}

// ── 티켓 충전 모달 ────────────────────────────────────────────

function openChargeModal(memberId, ticketType, memberName) {
    document.getElementById('chargeMemberKeyword').value = '';
    document.getElementById('chargeMemberResults').style.display = 'none';
    document.getElementById('chargeAmount').value = '1';
    document.getElementById('chargeMemo').value = '';
    document.getElementById('chargeType').value = ticketType || 'ONE_POINT';

    if (memberId) {
        chargeTargetMemberId   = memberId;
        chargeTargetMemberName = memberName || memberId;
        document.getElementById('chargeSearchGroup').style.display = 'none';
        document.getElementById('chargeTargetDisplay').textContent = memberName || memberId;
        document.getElementById('chargeTargetDisplay').style.color = 'var(--text-primary)';
    } else {
        chargeTargetMemberId   = null;
        chargeTargetMemberName = null;
        document.getElementById('chargeSearchGroup').style.display = '';
        document.getElementById('chargeTargetDisplay').textContent = '선택된 회원 없음';
        document.getElementById('chargeTargetDisplay').style.color = 'var(--text-muted)';
    }
    document.getElementById('chargeModal').classList.add('open');
}

function closeChargeModal() { document.getElementById('chargeModal').classList.remove('open'); }

async function searchChargeMember() {
    const kw = document.getElementById('chargeMemberKeyword').value.trim();
    if (!kw) return;
    const res  = await fetch(`/api/members?keyword=${encodeURIComponent(kw)}&page=0&size=10`);
    const json = await res.json();
    const list  = json.data?.members || [];
    const el    = document.getElementById('chargeMemberResults');
    if (!list.length) {
        el.innerHTML = `<div style="padding:10px 12px;font-size:13px;color:var(--text-muted)">검색 결과 없음</div>`;
    } else {
        el.innerHTML = list.map(m => `
            <div class="member-result-item" onclick="selectChargeMember('${m.id}','${escHtml(m.name||m.id)}')">
                ${escHtml(m.name || m.id)}
                ${m.phone ? `<span style="color:var(--text-muted);margin-left:8px;font-size:12px">${m.phone}</span>` : ''}
            </div>`).join('');
    }
    el.style.display = '';
}

function selectChargeMember(id, name) {
    chargeTargetMemberId   = id;
    chargeTargetMemberName = name;
    document.getElementById('chargeTargetDisplay').textContent = name;
    document.getElementById('chargeTargetDisplay').style.color = 'var(--text-primary)';
    document.getElementById('chargeMemberResults').style.display = 'none';
    document.getElementById('chargeMemberKeyword').value = '';
}

async function chargeTicket() {
    if (!chargeTargetMemberId) { alert('회원을 선택해주세요.'); return; }
    const ticketType = document.getElementById('chargeType').value;
    const amount     = parseInt(document.getElementById('chargeAmount').value);
    const description = document.getElementById('chargeMemo').value;
    if (!amount || amount < 1) { alert('장수를 올바르게 입력해주세요.'); return; }

    const res = await fetch(`/api/members/${chargeTargetMemberId}/tickets/charge`, {
        method: 'POST', headers: csrfHeaders(),
        body: JSON.stringify({ ticketType, amount, description })
    });
    const json = await res.json();
    if (json.success !== false) {
        closeChargeModal();
        loadProductSummary();
        if (activeTab === 'ticket') loadTickets();
        const typeLabel = ticketType === 'ONE_POINT' ? '원포인트카드' : '피드백티켓';
        alert(`${chargeTargetMemberName}에게 ${typeLabel} ${amount}장 충전 완료`);
    } else {
        alert(json.message || '충전에 실패했습니다.');
    }
}

// ── 페이지네이션 ──────────────────────────────────────────────

function renderPagination(elId, total, currentPage, onClickFn) {
    const totalPages = Math.ceil(total / pageSize);
    const el = document.getElementById(elId);
    if (totalPages <= 1) { el.innerHTML = ''; return; }
    el.innerHTML = Array.from({length: totalPages}, (_, i) =>
        `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="(${onClickFn})(${i})">${i+1}</button>`
    ).join('');
}

// ── 공통 유틸 ────────────────────────────────────────────────

function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

// 초기화
loadProductSummary();
loadSubs();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK_Fit Admin — 재등록 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('reregistration')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">재등록 관리</h1>
        </div>
        <div class="header-right">
            <button class="btn btn-secondary" onclick="runAutoClassify()" id="classifyBtn">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                자동 분류 실행
            </button>
        </div>
    </header>

    <!-- 요약 카드 -->
    <div style="display:flex;gap:12px;padding:16px 24px;flex-wrap:wrap" id="summaryCards">
        <div class="summary-card" id="sc-pending"><div class="sc-val">-</div><div class="sc-label">대기</div></div>
        <div class="summary-card" id="sc-in_progress"><div class="sc-val">-</div><div class="sc-label">진행 중</div></div>
        <div class="summary-card success" id="sc-success"><div class="sc-val">-</div><div class="sc-label">성공</div></div>
        <div class="summary-card error" id="sc-failed"><div class="sc-val">-</div><div class="sc-label">실패</div></div>
        <div class="summary-card warning" id="sc-hold"><div class="sc-val">-</div><div class="sc-label">보류</div></div>
    </div>

    <!-- 필터 -->
    <div class="search-bar">
        <select class="filter-select" id="statusFilter" onchange="currentPage=0;loadList()">
            <option value="">전체 상태</option>
            <option value="pending">대기</option>
            <option value="in_progress">진행 중</option>
            <option value="success">성공</option>
            <option value="failed">실패</option>
            <option value="hold">보류</option>
        </select>
        <select class="filter-select" id="reasonFilter" onchange="currentPage=0;loadList()">
            <option value="">전체 사유</option>
            <option value="membership_expiry">이용권 만료 예정</option>
            <option value="pt_low">PT 잔여 부족</option>
            <option value="low_routine">루틴 이행률 저조</option>
            <option value="low_app_usage">앱 미접속</option>
            <option value="feedback_history">피드백 이력</option>
        </select>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>회원명</th>
                    <th>전화번호</th>
                    <th>분류 사유</th>
                    <th>상태</th>
                    <th>담당자</th>
                    <th>메모</th>
                    <th>등록일</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="pagination" id="pagination"></div>
</main>

<!-- 상세/편집 모달 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width:500px">
        <div class="modal-header">
            <span class="modal-title">재등록 상담 관리</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div style="display:flex;gap:20px;margin-bottom:16px">
                <div>
                    <div style="font-size:11px;color:var(--text-muted)">회원</div>
                    <div id="dtMember" style="font-weight:600;margin-top:2px"></div>
                </div>
                <div>
                    <div style="font-size:11px;color:var(--text-muted)">사유</div>
                    <div id="dtReason" style="margin-top:2px"></div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">상태 변경</label>
                <select class="form-select" id="dtStatus">
                    <option value="pending">대기</option>
                    <option value="in_progress">진행 중</option>
                    <option value="success">성공</option>
                    <option value="failed">실패</option>
                    <option value="hold">보류</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">메모</label>
                <textarea class="form-textarea" id="dtMemo" rows="4" placeholder="상담 내용, 특이사항 등..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="saveDetail()">저장</button>
        </div>
    </div>
</div>

<style>
.summary-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 20px; min-width: 90px; text-align: center;
}
.summary-card.success .sc-val { color: var(--success); }
.summary-card.error   .sc-val { color: var(--error); }
.summary-card.warning .sc-val { color: var(--warning); }
.sc-val { font-size: 24px; font-weight: 700; color: var(--accent); }
.sc-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
</style>

<script>
let currentPage = 0;
const pageSize  = 20;
let editingId   = null;

function csrfHeaders(extra) {
    return Object.assign({ 'Content-Type': 'application/json' }, extra);
}

const statusLabel = {
    pending: '대기', in_progress: '진행 중', success: '성공', failed: '실패', hold: '보류'
};
const statusBadge = {
    pending: 'badge-pending', in_progress: 'badge-admin',
    success: 'badge-active',  failed: 'badge-expired', hold: 'badge-suspended'
};
const reasonLabel = {
    membership_expiry: '이용권 만료 예정',
    pt_low:            'PT 잔여 부족',
    low_routine:       '루틴 이행률 저조',
    low_app_usage:     '앱 미접속',
    feedback_history:  '피드백 이력'
};
const reasonColor = {
    membership_expiry: 'var(--error)',
    pt_low:            'var(--warning)',
    low_routine:       'var(--warning)',
    low_app_usage:     'var(--text-muted)',
    feedback_history:  'var(--success)'
};

async function loadSummary() {
    const res  = await fetch('/api/reregistration/summary');
    const json = await res.json();
    if (!json.success) return;
    const d = json.data;
    ['pending','in_progress','success','failed','hold'].forEach(k => {
        const el = document.getElementById(`sc-${k}`);
        if (el) el.querySelector('.sc-val').textContent = d[k] ?? 0;
    });
}

async function loadList() {
    const status = document.getElementById('statusFilter').value;
    const reason = document.getElementById('reasonFilter').value;
    const res  = await fetch(`/api/reregistration?status=${status}&reason=${reason}&page=${currentPage}&size=${pageSize}`);
    const json = await res.json();
    if (!json.success) return;
    renderTable(json.data.items, json.data.total);
}

function renderTable(items, total) {
    const tbody = document.getElementById('tableBody');
    if (!items || !items.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">재등록 대상자가 없습니다.</td></tr>`;
        renderPagination(0);
        return;
    }
    tbody.innerHTML = items.map(r => `
        <tr>
            <td>${r.memberName || r.memberId}</td>
            <td>${r.memberPhone || '-'}</td>
            <td><span style="font-size:12px;color:${reasonColor[r.reason] || 'inherit'}">${reasonLabel[r.reason] || r.reason}</span></td>
            <td><span class="badge ${statusBadge[r.status] || ''}">${statusLabel[r.status] || r.status}</span></td>
            <td>${r.assignedToName || '<span style="color:var(--text-muted)">미배정</span>'}</td>
            <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(r.memo)}">${r.memo ? escHtml(r.memo) : '<span style="color:var(--text-muted)">-</span>'}</td>
            <td>${fmtDate(r.createdAt)}</td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px"
                        onclick="openDetail('${r.id}','${escHtml(r.memberName || r.memberId)}','${r.reason}','${r.status}','${escHtml(r.memo||'')}')">관리</button>
            </td>
        </tr>`).join('');
    renderPagination(total);
}

function renderPagination(total) {
    const totalPages = Math.ceil(total / pageSize);
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    pg.innerHTML = Array.from({length: totalPages}, (_,i) =>
        `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="currentPage=${i};loadList()">${i+1}</button>`
    ).join('');
}

function openDetail(id, memberName, reason, status, memo) {
    editingId = id;
    document.getElementById('dtMember').textContent = memberName;
    document.getElementById('dtReason').textContent = reasonLabel[reason] || reason;
    document.getElementById('dtStatus').value = status;
    document.getElementById('dtMemo').value   = memo;
    document.getElementById('detailModal').classList.add('open');
}

function closeModal() {
    document.getElementById('detailModal').classList.remove('open');
    editingId = null;
}

async function saveDetail() {
    const status = document.getElementById('dtStatus').value;
    const memo   = document.getElementById('dtMemo').value;

    await fetch(`/api/reregistration/${editingId}/status`, {
        method: 'PATCH', headers: csrfHeaders(), body: JSON.stringify({ status })
    });
    await fetch(`/api/reregistration/${editingId}/memo`, {
        method: 'PATCH', headers: csrfHeaders(), body: JSON.stringify({ memo })
    });

    closeModal();
    loadList();
    loadSummary();
}

async function runAutoClassify() {
    const btn = document.getElementById('classifyBtn');
    btn.disabled = true;
    btn.textContent = '분류 중...';
    try {
        const res  = await fetch('/api/reregistration/auto-classify', {
            method: 'POST', headers: csrfHeaders()
        });
        const json = await res.json();
        if (json.success) {
            alert(`자동 분류 완료: 신규 ${json.data.created}건 생성`);
            loadList();
            loadSummary();
        }
    } finally {
        btn.disabled = false;
        btn.textContent = '자동 분류 실행';
    }
}

function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(s) {
    if (!s) return '-';
    return String(s).replace('T',' ').substring(0,16);
}

function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

loadSummary();
loadList();
</script>
</body>
</html>

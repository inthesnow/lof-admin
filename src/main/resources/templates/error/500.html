<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK_Fit Admin — 500</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <style>
        :root { --bg:#0D1117; --surface:#161B22; --accent:#58A6FF; --text-primary:#F0F6FC; --text-muted:#6E7681; --error:#F85149; --border:#30363D; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text-primary); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .wrap { text-align:center; padding:40px; }
        .code { font-size:80px; font-weight:800; color:var(--error); line-height:1; margin-bottom:16px; }
        .msg { font-size:20px; font-weight:600; margin-bottom:8px; }
        .sub { font-size:14px; color:var(--text-muted); margin-bottom:32px; }
        .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 24px; background:var(--accent); color:var(--bg); border-radius:8px; text-decoration:none; font-size:14px; font-weight:600; transition:opacity 0.15s; }
        .btn:hover { opacity:0.85; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="code">500</div>
    <div class="msg">서버 오류가 발생했습니다</div>
    <p class="sub">일시적인 오류입니다. 잠시 후 다시 시도해 주세요.</p>
    <a href="/dashboard" class="btn">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        대시보드로 이동
    </a>
</div>
</body>
</html>

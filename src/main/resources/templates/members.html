<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK_Fit Admin — 회원 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('members')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">회원 관리</h1>
        </div>
        <div class="header-right">
            <button class="btn btn-primary" onclick="openModal()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                회원 등록
            </button>
        </div>
    </header>

    <div class="search-bar">
        <div class="search-input-wrap">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="이름, 전화번호 검색..." oninput="debounceSearch()">
        </div>
        <select class="filter-select" id="statusFilter" onchange="loadMembers()">
            <option value="">전체 상태</option>
            <option value="ACTIVE">유효</option>
            <option value="EXPIRED">만기</option>
            <option value="SUSPENDED">정지</option>
        </select>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>이름</th>
                    <th>전화번호</th>
                    <th>성별</th>
                    <th>상태</th>
                    <th>가입일</th>
                    <th>회원권 만료</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="memberTableBody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</main>

<!-- 회원 등록/수정 모달 -->
<div class="modal-overlay" id="memberModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">회원 등록</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">이름 *</label>
                    <input type="text" class="form-input" id="mName" placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label class="form-label">전화번호 *</label>
                    <input type="text" class="form-input" id="mPhone" placeholder="010-0000-0000">
                </div>
                <div class="form-group">
                    <label class="form-label">성별</label>
                    <select class="form-select" id="mGender">
                        <option value="M">남성</option>
                        <option value="F">여성</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">상태</label>
                    <select class="form-select" id="mStatus">
                        <option value="ACTIVE">유효</option>
                        <option value="EXPIRED">만기</option>
                        <option value="SUSPENDED">정지</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">생년월일</label>
                    <input type="date" class="form-input" id="mBirthDate">
                </div>
                <div class="form-group">
                    <label class="form-label">회원권 만료일</label>
                    <input type="date" class="form-input" id="mMembershipEnd">
                </div>
                <div class="form-group full">
                    <label class="form-label">메모</label>
                    <textarea class="form-textarea" id="mMemo" placeholder="메모 입력..."></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="saveMember()">저장</button>
        </div>
    </div>
</div>

<script>
let currentPage = 0;
const pageSize = 10;
let editingId = null;
let searchTimer = null;

const statusLabel = { ACTIVE: '유효', EXPIRED: '만기', SUSPENDED: '정지' };
const statusBadge = { ACTIVE: 'badge-active', EXPIRED: 'badge-expired', SUSPENDED: 'badge-suspended' };
const genderLabel = { M: '남성', F: '여성' };

function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 0; loadMembers(); }, 350);
}

async function loadMembers() {
    const keyword = document.getElementById('searchInput').value;
    const status  = document.getElementById('statusFilter').value;
    const res = await fetch(`/api/members?keyword=${encodeURIComponent(keyword)}&status=${status}&page=${currentPage}&size=${pageSize}`);
    const json = await res.json();
    renderTable(json.data.members, json.data.total);
}

function renderTable(members, total) {
    const tbody = document.getElementById('memberTableBody');
    if (!members.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">회원 데이터가 없습니다.</td></tr>`;
        renderPagination(0);
        return;
    }
    tbody.innerHTML = members.map(m => `
        <tr>
            <td>${m.name}</td>
            <td>${m.phone}</td>
            <td>${genderLabel[m.gender] || m.gender}</td>
            <td><span class="badge ${statusBadge[m.status]}">${statusLabel[m.status]}</span></td>
            <td>${m.joinDate || '-'}</td>
            <td>${m.membershipEnd || '-'}</td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px" onclick="editMember(${m.id})">수정</button>
                <button class="btn btn-danger" style="padding:5px 10px;font-size:12px" onclick="deleteMember(${m.id}, '${m.name}')">삭제</button>
            </td>
        </tr>
    `).join('');
    renderPagination(total);
}

function renderPagination(total) {
    const totalPages = Math.ceil(total / pageSize);
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>&#8249;</button>`;
    for (let i = 0; i < totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i + 1}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>&#8250;</button>`;
    pag.innerHTML = html;
}

function goPage(p) { currentPage = p; loadMembers(); }

function openModal(id) {
    editingId = id || null;
    document.getElementById('modalTitle').textContent = id ? '회원 수정' : '회원 등록';
    ['mName','mPhone','mGender','mStatus','mBirthDate','mMembershipEnd','mMemo'].forEach(id => {
        const el = document.getElementById(id);
        if (el.tagName === 'SELECT') el.selectedIndex = 0; else el.value = '';
    });
    document.getElementById('memberModal').classList.add('open');
}

function closeModal() { document.getElementById('memberModal').classList.remove('open'); }

async function editMember(id) {
    const res = await fetch(`/api/members/${id}`);
    const json = await res.json();
    const m = json.data;
    editingId = id;
    document.getElementById('modalTitle').textContent = '회원 수정';
    document.getElementById('mName').value = m.name || '';
    document.getElementById('mPhone').value = m.phone || '';
    document.getElementById('mGender').value = m.gender || 'M';
    document.getElementById('mStatus').value = m.status || 'ACTIVE';
    document.getElementById('mBirthDate').value = m.birthDate || '';
    document.getElementById('mMembershipEnd').value = m.membershipEnd || '';
    document.getElementById('mMemo').value = m.memo || '';
    document.getElementById('memberModal').classList.add('open');
}

async function saveMember() {
    const body = {
        name: document.getElementById('mName').value,
        phone: document.getElementById('mPhone').value,
        gender: document.getElementById('mGender').value,
        status: document.getElementById('mStatus').value,
        birthDate: document.getElementById('mBirthDate').value || null,
        membershipEnd: document.getElementById('mMembershipEnd').value || null,
        memo: document.getElementById('mMemo').value,
    };
    const url = editingId ? `/api/members/${editingId}` : '/api/members';
    const method = editingId ? 'PUT' : 'POST';
    await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    closeModal();
    loadMembers();
}

async function deleteMember(id, name) {
    if (!confirm(`${name} 회원을 삭제하시겠습니까?`)) return;
    await fetch(`/api/members/${id}`, { method: 'DELETE' });
    loadMembers();
}

function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

loadMembers();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK_Fit Admin</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">

        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="36" height="36">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42
                             4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81
                             14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4
                             6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </div>
            <h1 class="logo-title">LINK_Fit</h1>
            <p class="logo-subtitle">관리자 페이지</p>
        </div>

        <!-- 에러/알림 메시지 -->
        <div id="alertBox" class="error-box" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                         10-4.48 10-10S17.52 2 12 2zm1
                         15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <span id="alertMsg"></span>
        </div>

        <!-- 로그아웃 성공 메시지 -->
        <div id="logoutBox" class="error-box" style="display:none;
             background-color:color-mix(in srgb,#3FB950 15%,transparent);
             border-color:color-mix(in srgb,#3FB950 50%,transparent);color:#3FB950">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
            <span>로그아웃되었습니다.</span>
        </div>

        <form id="loginForm" class="login-form" onsubmit="doLogin(event)">

            <!-- 지점 코드 -->
            <div class="field-group">
                <label for="branchCode">지점 코드</label>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75
                                 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38
                                 0-2.5-1.12-2.5-2.5s1.12-2.5
                                 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    <input type="text" id="branchCode"
                           placeholder="예) LF01" maxlength="4"
                           autocomplete="off" autocapitalize="characters"
                           oninput="this.value=this.value.toUpperCase()"
                           required>
                </div>
                <span class="field-hint">영문 2자리 + 숫자 2자리</span>
            </div>

            <!-- 아이디 -->
            <div class="field-group">
                <label for="usernameInput">아이디</label>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5
                                 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10
                                 1.7-10 5v1h20v-1c0-3.3-6.7-5-10-5z"/>
                    </svg>
                    <input type="text" id="usernameInput"
                           placeholder="관리자 아이디" required autocomplete="username">
                </div>
            </div>

            <!-- 비밀번호 -->
            <div class="field-group">
                <label for="password">비밀번호</label>
                <div class="input-wrap">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7
                                 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0
                                 1.1.9 2 2 2h12c1.1 0 2-.9
                                 2-2V10c0-1.1-.9-2-2-2zm-6
                                 9c-1.1 0-2-.9-2-2s.9-2 2-2
                                 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7
                                 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4
                                 3.1 3.1v2z"/>
                    </svg>
                    <input type="password" id="password"
                           placeholder="비밀번호 입력" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="btnLogin" class="btn-login">로그인</button>
        </form>

        <p class="footer-text">LINK_Fit Admin &copy; 2025</p>
    </div>
</div>

<script>
(function() {
    const params = new URLSearchParams(location.search);
    if (params.has('logout')) {
        document.getElementById('logoutBox').style.display = 'flex';
    }
})();

async function doLogin(e) {
    e.preventDefault();

    const branchCode = document.getElementById('branchCode').value.trim().toUpperCase();
    const username   = document.getElementById('usernameInput').value.trim();
    const password   = document.getElementById('password').value;
    const btn        = document.getElementById('btnLogin');

    if (!/^[A-Z]{2}\d{2}$/.test(branchCode)) {
        showError('지점 코드 형식이 올바르지 않습니다. (예: LF01)');
        document.getElementById('branchCode').focus();
        return;
    }

    btn.disabled = true;
    btn.textContent = '로그인 중...';

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ branchCode, username, password })
        });
        const json = await res.json();

        if (json.success) {
            location.href = '/dashboard';
        } else {
            showError(json.message || '로그인에 실패했습니다.');
        }
    } catch (err) {
        showError('서버와 연결할 수 없습니다.');
    } finally {
        btn.disabled = false;
        btn.textContent = '로그인';
    }
}

function showError(msg) {
    const box = document.getElementById('alertBox');
    document.getElementById('alertMsg').textContent = msg;
    box.style.display = 'flex';
}
</script>
</body>
</html>

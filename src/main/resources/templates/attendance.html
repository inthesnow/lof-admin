<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINK_Fit Admin — 출석 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        .attend-summary {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
            padding: 20px 24px; border-bottom: 1px solid var(--border);
        }
        .attend-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px;
        }
        .attend-card-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        .attend-card-value { font-size: 28px; font-weight: 700; color: var(--text-primary); }
        .attend-card-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
        .attend-card-sub .male { color: #58A6FF; }
        .attend-card-sub .female { color: #FF7BAC; }
        .trend-section {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
        }
        .trend-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; }
        .trend-canvas-wrap { position: relative; height: 200px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('attendance')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">출석 관리</h1>
        </div>
        <div class="header-right">
            <input type="date" class="form-input" id="dateFilter" style="width:160px" onchange="loadAttendance()">
            <button class="btn btn-primary" onclick="openModal()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                출석 체크
            </button>
        </div>
    </header>

    <div class="attend-summary" id="attendSummary">
        <div class="attend-card">
            <div class="attend-card-label">전체 출석</div>
            <div class="attend-card-value" id="sumTotal">-</div>
            <div class="attend-card-sub" id="sumGender">-</div>
        </div>
        <div class="attend-card">
            <div class="attend-card-label">회원권 출석</div>
            <div class="attend-card-value" id="sumMembership">-</div>
        </div>
        <div class="attend-card">
            <div class="attend-card-label">수업 출석</div>
            <div class="attend-card-value" id="sumClass">-</div>
        </div>
    </div>

    <div class="trend-section">
        <div class="trend-title">최근 30일 출석 추이</div>
        <div class="trend-canvas-wrap">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="search-bar">
        <select class="filter-select" id="typeFilter" onchange="loadAttendance()">
            <option value="">전체</option>
            <option value="MEMBERSHIP">회원권</option>
            <option value="GROUP">그룹 수업</option>
            <option value="PT">개인 레슨</option>
        </select>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>이름</th>
                    <th>성별</th>
                    <th>유형</th>
                    <th>날짜</th>
                    <th>체크인 시간</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="attendTableBody">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<!-- 출석 체크 모달 -->
<div class="modal-overlay" id="attendModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title">출석 체크</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">회원 ID</label>
                    <input type="number" class="form-input" id="aMemberId" placeholder="회원 ID">
                </div>
                <div class="form-group">
                    <label class="form-label">이름</label>
                    <input type="text" class="form-input" id="aMemberName" placeholder="이름">
                </div>
                <div class="form-group">
                    <label class="form-label">유형</label>
                    <select class="form-select" id="aType">
                        <option value="MEMBERSHIP">회원권</option>
                        <option value="GROUP">그룹 수업</option>
                        <option value="PT">개인 레슨</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="checkIn()">체크인</button>
        </div>
    </div>
</div>

<script>
function csrfHeaders(extra) {
    return Object.assign({ 'Content-Type': 'application/json' }, extra);
}

const typeLabel = { MEMBERSHIP: '회원권', GROUP: '그룹수업', PT: '개인레슨' };
const typeBadge = { MEMBERSHIP: 'badge-active', GROUP: 'badge-admin', PT: 'badge-super' };
const genderLabel = { M: '남성', F: '여성' };

document.getElementById('dateFilter').valueAsDate = new Date();

async function loadAttendance() {
    const date = document.getElementById('dateFilter').value;
    const res = await fetch(`/api/attendance?date=${date}`);
    const json = await res.json();
    const data = json.data;

    const males = data.filter(a => a.memberGender === 'M').length;
    const females = data.filter(a => a.memberGender === 'F').length;
    const membership = data.filter(a => a.type === 'MEMBERSHIP').length;
    const cls = data.filter(a => a.type !== 'MEMBERSHIP').length;

    document.getElementById('sumTotal').textContent = data.length + '명';
    document.getElementById('sumGender').innerHTML = `<span class="male">남성 ${males}명</span> / <span class="female">여성 ${females}명</span>`;
    document.getElementById('sumMembership').textContent = membership + '명';
    document.getElementById('sumClass').textContent = cls + '명';

    const typeFilter = document.getElementById('typeFilter').value;
    const filtered = typeFilter ? data.filter(a => a.type === typeFilter) : data;
    renderTable(filtered);
}

function renderTable(data) {
    const tbody = document.getElementById('attendTableBody');
    if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">출석 데이터가 없습니다.</td></tr>`;
        return;
    }
    tbody.innerHTML = data.map(a => `
        <tr>
            <td>${a.memberName}</td>
            <td>${genderLabel[a.memberGender] || a.memberGender}</td>
            <td><span class="badge ${typeBadge[a.type]}">${typeLabel[a.type]}</span></td>
            <td>${a.attendDate || '-'}</td>
            <td>${a.checkInTime || '-'}</td>
            <td>
                <button class="btn btn-danger" style="padding:5px 10px;font-size:12px" onclick="cancelAttend(${a.id})">취소</button>
            </td>
        </tr>
    `).join('');
}

function openModal() { document.getElementById('attendModal').classList.add('open'); }
function closeModal() { document.getElementById('attendModal').classList.remove('open'); }

async function checkIn() {
    const body = {
        memberId: parseInt(document.getElementById('aMemberId').value),
        memberName: document.getElementById('aMemberName').value,
        type: document.getElementById('aType').value,
    };
    await fetch('/api/attendance', { method: 'POST', headers: csrfHeaders(), body: JSON.stringify(body) });
    closeModal();
    loadAttendance();
}

async function cancelAttend(id) {
    if (!confirm('출석을 취소하시겠습니까?')) return;
    await fetch(`/api/attendance/${id}`, { method: 'DELETE', headers: csrfHeaders() });
    loadAttendance();
}

function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

loadAttendance();
loadTrend();

let trendChart = null;
async function loadTrend() {
    const end   = new Date();
    const start = new Date(); start.setDate(start.getDate() - 29);
    const fmt   = d => d.toISOString().slice(0, 10);
    const res   = await fetch(`/api/attendance/trend?startDate=${fmt(start)}&endDate=${fmt(end)}`);
    const json  = await res.json();
    const rows  = json.data || [];

    const dateMap = {};
    rows.forEach(r => { dateMap[r.date] = Number(r.cnt); });

    const labels = [], values = [];
    for (let i = 29; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const key = fmt(d);
        labels.push(key.slice(5));
        values.push(dateMap[key] || 0);
    }

    const ctx = document.getElementById('trendChart').getContext('2d');
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: '출석 수',
                data: values,
                borderColor: '#58A6FF',
                backgroundColor: 'rgba(88,166,255,0.12)',
                borderWidth: 2,
                pointRadius: 3,
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: '#8B949E', maxTicksLimit: 10 }, grid: { color: '#21262D' } },
                y: { ticks: { color: '#8B949E', stepSize: 1 }, grid: { color: '#21262D' }, beginAtZero: true }
            }
        }
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>링크온핏 CRM — 대시보드</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:99; }
        .sidebar-overlay.open { display:block; }
        .mobile-menu-btn { display:none; background:none; border:none; color:var(--sb-text); cursor:pointer; align-items:center; justify-content:center; width:36px; height:36px; border-radius:8px; }
        @media(max-width:768px){ .sidebar{transform:translateX(-100%); transition:transform 0.25s;} .sidebar.open{transform:translateX(0);} .main{margin-left:0;} .mobile-menu-btn{display:flex;} }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></aside>

<main class="main">

    <!-- Header -->
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">대시보드</h1>
            <div class="date-nav">
                <button class="date-btn" onclick="moveDate(-1)">&#8249;</button>
                <span class="date-label" id="dateLabel">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15" style="color:var(--text-muted)"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
                    <span id="dateLabelText"></span>
                </span>
                <button class="date-btn" onclick="moveDate(1)">&#8250;</button>
            </div>
        </div>
        <div class="header-right">
            <div class="period-tabs">
                <button class="period-tab active" onclick="setPeriod('daily',this)">일간</button>
                <button class="period-tab" onclick="setPeriod('weekly',this)">주간</button>
                <button class="period-tab" onclick="setPeriod('monthly',this)">월간</button>
            </div>
        </div>
    </header>

    <!-- ① 상단 KPI 4개 -->
    <div class="kpi-row">
        <div class="kpi-card">
            <div class="kpi-label">전체 회원 수</div>
            <div class="kpi-value" id="kpiTotal">-<span class="kpi-unit">명</span></div>
            <div class="kpi-delta up" id="kpiTotalDelta" style="display:none">
                <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M7 14l5-5 5 5z"/></svg>
                <span id="kpiTotalDeltaVal"></span>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">활성 회원</div>
            <div class="kpi-value" id="kpiActive">-<span class="kpi-unit">명</span></div>
            <div class="kpi-delta up" id="kpiActiveDelta" style="display:none">
                <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M7 14l5-5 5 5z"/></svg>
                <span id="kpiActiveDeltaVal"></span>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">만료 / 정지 회원</div>
            <div class="kpi-value" id="kpiExpired">-<span class="kpi-unit">명</span></div>
            <div class="kpi-delta down" id="kpiExpiredDelta" style="display:none">
                <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M7 10l5 5 5-5z"/></svg>
                <span id="kpiExpiredDeltaVal"></span>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">신규 회원 (이번달)</div>
            <div class="kpi-value" id="kpiNew">-<span class="kpi-unit">명</span></div>
            <div class="kpi-delta up" id="kpiNewDelta" style="display:none">
                <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M7 14l5-5 5 5z"/></svg>
                <span id="kpiNewDeltaVal"></span>
            </div>
        </div>
    </div>

    <!-- ② 중간 위젯 5개 -->
    <div class="widget-grid">

        <!-- 루틴 이행 출석률 -->
        <div class="widget">
            <div class="widget-title">루틴 이행 출석률</div>
            <div class="donut-wrap">
                <canvas id="routineDonut"></canvas>
                <div class="donut-center">
                    <div class="donut-pct" id="routinePct">0%</div>
                    <div class="donut-sub">이행률</div>
                </div>
            </div>
            <div class="donut-desc" id="routineDesc" style="color:var(--text-muted); font-size:12px">-명 / -명</div>
        </div>

        <!-- 피드백 대기 건수 -->
        <div class="widget">
            <div class="widget-title">피드백 대기</div>
            <div class="big-num" id="feedbackPending">-<span class="big-unit">건</span></div>
            <div class="widget-sub-label">미처리 요청</div>
            <div style="margin-top:12px">
                <a href="/feedback" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);text-decoration:none;font-weight:500">
                    바로가기
                    <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </a>
            </div>
        </div>

        <!-- 미루틴 사용률 -->
        <div class="widget">
            <div class="widget-title">피드백 티켓 사용률</div>
            <div class="progress-pct" id="ticketUsagePct">0%</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="ticketUsageBar" style="width:0%"></div>
            </div>
            <div class="progress-detail" id="ticketUsageDetail">- / -회</div>
        </div>

        <!-- 이달 매출 -->
        <div class="widget">
            <div class="widget-title">이달 매출 현황</div>
            <div class="rev-amount" id="revAmount">-</div>
            <div class="rev-compare" id="revCompare" style="color:var(--text-muted); font-size:12px; margin-bottom:10px">전월 대비 집계 중</div>
            <div class="sparkline-wrap">
                <canvas id="sparklineChart"></canvas>
            </div>
        </div>

        <!-- 재등록 대상자 -->
        <div class="widget">
            <div class="widget-title">재등록 성상 대상자</div>
            <div>
                <span class="rereg-total" id="reregTotal">-</span>
                <span class="rereg-unit">명</span>
            </div>
            <div class="rereg-list" id="reregList">
                <div class="rereg-item">
                    <span><span class="rereg-dot" style="background:#3B82F6"></span>상담 진행</span>
                    <span class="rereg-count" id="reregActive">-명</span>
                </div>
                <div class="rereg-item">
                    <span><span class="rereg-dot" style="background:#F59E0B"></span>상담 예정</span>
                    <span class="rereg-count" id="reregPending">-명</span>
                </div>
                <div class="rereg-item">
                    <span><span class="rereg-dot" style="background:#9CA3AF"></span>보류</span>
                    <span class="rereg-count" id="reregHold">-명</span>
                </div>
            </div>
        </div>

    </div>

    <!-- ③ 30일 활성 회원 트렌드 -->
    <div class="trend-section">
        <div class="trend-header">
            <span class="trend-title">활성 회원 추이 (최근 30일)</span>
        </div>
        <div class="trend-canvas-wrap">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

</main>

<script>
let currentDate = new Date();
let currentPeriod = 'daily';

function formatDate(d) { return d.toISOString().split('T')[0]; }

function updateDateLabel() {
    const el = document.getElementById('dateLabelText');
    if (currentPeriod === 'daily') {
        el.textContent = `${currentDate.getFullYear()}년 ${String(currentDate.getMonth()+1).padStart(2,'0')}월 ${String(currentDate.getDate()).padStart(2,'0')}일`;
    } else if (currentPeriod === 'weekly') {
        const s = new Date(currentDate); s.setDate(s.getDate() - s.getDay());
        const e = new Date(s); e.setDate(e.getDate() + 6);
        el.textContent = `${formatDate(s)} ~ ${formatDate(e)}`;
    } else {
        el.textContent = `${currentDate.getFullYear()}년 ${String(currentDate.getMonth()+1).padStart(2,'0')}월`;
    }
}

function moveDate(dir) {
    if (currentPeriod === 'daily') currentDate.setDate(currentDate.getDate() + dir);
    else if (currentPeriod === 'weekly') currentDate.setDate(currentDate.getDate() + dir * 7);
    else currentDate.setMonth(currentDate.getMonth() + dir);
    updateDateLabel();
    loadAll();
}

function setPeriod(period, btn) {
    currentPeriod = period;
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    updateDateLabel();
    loadAll();
}

// ── 회원 KPI ─────────────────────────────────────────────
async function loadMemberKPI() {
    try {
        const res = await fetch(`/api/dashboard/members?date=${formatDate(currentDate)}&period=${currentPeriod}`);
        const { data } = await res.json();
        const active  = data.active  || 0;
        const expired = data.expired || 0;
        const newJoin = data.newJoin || 0;
        const reJoin  = data.reJoin  || 0;
        const total   = active + expired;

        document.getElementById('kpiTotal').innerHTML   = `${total.toLocaleString()}<span class="kpi-unit">명</span>`;
        document.getElementById('kpiActive').innerHTML  = `${active.toLocaleString()}<span class="kpi-unit">명</span>`;
        document.getElementById('kpiExpired').innerHTML = `${expired.toLocaleString()}<span class="kpi-unit">명</span>`;
        document.getElementById('kpiNew').innerHTML     = `${newJoin.toLocaleString()}<span class="kpi-unit">명</span>`;
    } catch(e) {}
}

// ── CRM 요약 ─────────────────────────────────────────────
async function loadCrmSummary() {
    try {
        const res = await fetch('/api/dashboard/crm-summary');
        if (!res.ok) return;
        const { data } = await res.json();
        if (!data) return;

        document.getElementById('feedbackPending').innerHTML =
            `${data.pendingFeedback ?? 0}<span class="big-unit">건</span>`;

        document.getElementById('reregTotal').textContent = data.pendingReregistration ?? 0;
    } catch(e) {}
}

// ── 피드백 티켓 사용률 ────────────────────────────────────
async function loadTicketUsage() {
    try {
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth()+1).padStart(2,'0');
        const res = await fetch(`/api/feedback/tickets?monthYear=${y}-${m}&page=0&size=1`);
        if (!res.ok) return;
        const { data } = await res.json();
        const list = data?.content || [];
        if (!list.length) return;

        let usable = 0, used = 0;
        list.forEach(t => { usable += t.ticketBalance || 0; used += t.ticketsUsed || 0; });
        const total = usable + used;
        const pct = total > 0 ? Math.round(used / total * 100) : 0;
        document.getElementById('ticketUsagePct').textContent = pct + '%';
        document.getElementById('ticketUsageBar').style.width = pct + '%';
        document.getElementById('ticketUsageDetail').textContent = `${used.toLocaleString()} / ${total.toLocaleString()}회`;
    } catch(e) {}
}

// ── 이달 매출 + sparkline ─────────────────────────────────
let sparklineChart = null;
async function loadRevenue() {
    try {
        const today = new Date();
        const dateStr = formatDate(today);
        const res = await fetch(`/api/revenue/summary?date=${dateStr}&period=monthly`);
        if (!res.ok) return;
        const { data } = await res.json();
        if (!data) return;

        const total = data.totalRevenue || data.total || 0;
        document.getElementById('revAmount').textContent = total.toLocaleString() + '원';

        const compare = data.compareRate;
        if (compare != null) {
            const el = document.getElementById('revCompare');
            const isPos = compare >= 0;
            el.className = 'rev-compare ' + (isPos ? 'positive' : 'negative');
            el.innerHTML = `${isPos ? '▲' : '▼'} ${Math.abs(compare)}% 전월 대비`;
        }

        // sparkline from daily trend
        const trendRes = await fetch('/api/stats/daily');
        if (trendRes.ok) {
            const { data: trendData } = await trendRes.json();
            drawSparkline(trendData || []);
        }
    } catch(e) {}
}

function drawSparkline(rows) {
    const dateMap = {};
    rows.forEach(r => { dateMap[r.statDate] = r.activeMembers || 0; });
    const values = [];
    for (let i = 29; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        values.push(dateMap[d.toISOString().slice(0,10)] ?? null);
    }
    const ctx = document.getElementById('sparklineChart').getContext('2d');
    if (sparklineChart) sparklineChart.destroy();
    sparklineChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: values.map((_, i) => i),
            datasets: [{ data: values, borderColor: '#3B82F6', borderWidth: 1.5, pointRadius: 0, spanGaps: false, tension: 0.4, fill: true, backgroundColor: 'rgba(59,130,246,0.08)' }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false, beginAtZero: false } }
        }
    });
}

// ── 루틴이행 출석률 도넛 ──────────────────────────────────
let routineDonut = null;
async function loadRoutineDonut() {
    try {
        const res = await fetch(`/api/dashboard/members?date=${formatDate(currentDate)}&period=${currentPeriod}`);
        const { data } = await res.json();
        const active = data.active || 0;
        const attend = data.attendToday || Math.round(active * 0.7);
        const pct = active > 0 ? Math.round(attend / active * 100) : 0;

        document.getElementById('routinePct').textContent = pct + '%';
        document.getElementById('routineDesc').textContent = `${attend.toLocaleString()}명 / ${active.toLocaleString()}명`;

        const ctx = document.getElementById('routineDonut').getContext('2d');
        if (routineDonut) routineDonut.destroy();
        routineDonut = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [pct, 100 - pct],
                    backgroundColor: ['#3B82F6', '#E5E7EB'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '72%',
                plugins: { legend: { display: false }, tooltip: { enabled: false } }
            }
        });
    } catch(e) {}
}

// ── 재등록 상세 ───────────────────────────────────────────
async function loadReregDetails() {
    try {
        const res = await fetch('/api/crm/reregistration/status-summary');
        if (!res.ok) return;
        const { data } = await res.json();
        if (!data) return;

        const total = (data.pending || 0) + (data.in_progress || 0) + (data.hold || 0) + (data.success || 0);
        document.getElementById('reregTotal').textContent  = total;
        document.getElementById('reregActive').textContent  = (data.in_progress || 0) + '명';
        document.getElementById('reregPending').textContent = (data.pending     || 0) + '명';
        document.getElementById('reregHold').textContent    = (data.hold        || 0) + '명';
    } catch(e) {}
}

// ── 30일 트렌드 차트 ──────────────────────────────────────
let trendChart = null;
async function loadTrend() {
    try {
        const res = await fetch('/api/stats/daily');
        if (!res.ok) return;
        const { data } = await res.json();
        const rows = data || [];

        const dateMap = {};
        rows.forEach(r => { dateMap[r.statDate] = r.activeMembers || 0; });

        const labels = [], values = [];
        for (let i = 29; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const key = d.toISOString().slice(0, 10);
            labels.push(key.slice(5));
            values.push(dateMap[key] ?? null);
        }

        const ctx = document.getElementById('trendChart').getContext('2d');
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: '활성 회원',
                    data: values,
                    borderColor: '#10B981',
                    backgroundColor: 'rgba(16,185,129,0.08)',
                    borderWidth: 2,
                    pointRadius: 3,
                    spanGaps: false,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#9CA3AF', maxTicksLimit: 10 }, grid: { color: '#F3F4F6' } },
                    y: { ticks: { color: '#9CA3AF' }, grid: { color: '#F3F4F6' }, beginAtZero: false }
                }
            }
        });
    } catch(e) {}
}

// ── 전체 로드 ────────────────────────────────────────────
function loadAll() {
    loadMemberKPI();
    loadRoutineDonut();
    loadCrmSummary();
    loadTicketUsage();
    loadRevenue();
    loadReregDetails();
    loadTrend();
}

function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

updateDateLabel();
loadAll();
</script>
</body>
</html>

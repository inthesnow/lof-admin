<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>링크온핏 CRM — 이용권/PT 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('products')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">이용권/PT 관리</h1>
        </div>
        <div class="header-right">
            <button class="btn btn-primary" onclick="openModal()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                이용권/PT 등록
            </button>
        </div>
    </header>

    <!-- 요약 카드 -->
    <div style="display:flex;gap:12px;padding:16px 24px;flex-wrap:wrap;border-bottom:1px solid var(--border)" id="ticketSummary">
        <div class="ticket-kpi"><div class="tkpi-v" id="kpiTotal">-</div><div class="tkpi-l">전체 이용권</div></div>
        <div class="ticket-kpi"><div class="tkpi-v" style="color:var(--success)" id="kpiActive">-</div><div class="tkpi-l">판매중</div></div>
        <div class="ticket-kpi"><div class="tkpi-v" style="color:var(--text-muted)" id="kpiInactive">-</div><div class="tkpi-l">판매중지</div></div>
    </div>

    <div class="search-bar">
        <select class="filter-select" id="typeFilter" onchange="loadProducts()">
            <option value="">전체 유형</option>
            <option value="MEMBERSHIP">회원권</option>
            <option value="GROUP">그룹 수업</option>
            <option value="PT">개인 레슨</option>
            <option value="LOCKER">락커</option>
            <option value="ITEM">물품</option>
        </select>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>이용권명</th>
                    <th>유형</th>
                    <th>가격</th>
                    <th>기간(일)</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</main>

<!-- 이용권 등록/수정 모달 -->
<div class="modal-overlay" id="productModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">이용권 등록</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">이용권명 *</label>
                    <input type="text" class="form-input" id="pName" placeholder="헬스 1개월 이용권">
                </div>
                <div class="form-group">
                    <label class="form-label">유형</label>
                    <select class="form-select" id="pType">
                        <option value="MEMBERSHIP">회원권</option>
                        <option value="GROUP">그룹 수업</option>
                        <option value="PT">개인 레슨</option>
                        <option value="LOCKER">락커</option>
                        <option value="ITEM">물품</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">가격 (원)</label>
                    <input type="number" class="form-input" id="pPrice" placeholder="80000" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label">기간 (일, 0=무기한)</label>
                    <input type="number" class="form-input" id="pDuration" placeholder="30" min="0">
                </div>
                <div class="form-group full">
                    <label class="form-label">설명</label>
                    <textarea class="form-textarea" id="pDescription" placeholder="이용권 설명..."></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="saveProduct()">저장</button>
        </div>
    </div>
</div>

<style>
.ticket-kpi { background:#fff; border:1px solid var(--border); border-radius:8px; padding:12px 20px; min-width:110px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.tkpi-v { font-size:22px; font-weight:700; color:var(--accent); }
.tkpi-l { font-size:12px; color:var(--text-muted); margin-top:2px; }
</style>

<script>
let currentPage = 0;
const pageSize = 20;
let editingId = null;

function csrfHeaders(extra) { return Object.assign({ 'Content-Type': 'application/json' }, extra); }

const typeLabel = { MEMBERSHIP: '회원권', GROUP: '그룹수업', PT: '개인레슨', LOCKER: '락커', ITEM: '물품' };
const typeBadge = { MEMBERSHIP: 'badge-active', GROUP: 'badge-admin', PT: 'badge-super', LOCKER: 'badge-pending', ITEM: 'badge-trainer' };

async function loadProducts() {
    const type = document.getElementById('typeFilter').value;
    try {
        const res  = await fetch(`/api/products?type=${type}&page=${currentPage}&size=${pageSize}`);
        const json = await res.json();
        renderTable(json.data.products, json.data.total);
        updateSummary(json.data.products || []);
    } catch(e) {}
}

function updateSummary(products) {
    document.getElementById('kpiTotal').textContent    = products.length;
    document.getElementById('kpiActive').textContent   = products.filter(p => p.active).length;
    document.getElementById('kpiInactive').textContent = products.filter(p => !p.active).length;
}

function renderTable(products, total) {
    const tbody = document.getElementById('productTableBody');
    if (!products || !products.length) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">이용권 데이터가 없습니다.</td></tr>`;
        renderPagination(0); return;
    }
    tbody.innerHTML = products.map(p => `
        <tr>
            <td style="font-weight:500">${p.name}</td>
            <td><span class="badge ${typeBadge[p.type] || 'badge-pending'}">${typeLabel[p.type] || p.type}</span></td>
            <td style="color:var(--success);font-weight:600">${(p.price||0).toLocaleString()}원</td>
            <td>${p.durationDays > 0 ? p.durationDays + '일' : '무기한'}</td>
            <td><span class="badge ${p.active ? 'badge-active' : 'badge-expired'}">${p.active ? '판매중' : '판매중지'}</span></td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-secondary" style="padding:5px 10px;font-size:12px" onclick="editProduct(${p.id})">수정</button>
                <button class="btn btn-danger"    style="padding:5px 10px;font-size:12px" onclick="deleteProduct(${p.id},'${(p.name||'').replace(/'/g,'')}')">삭제</button>
            </td>
        </tr>
    `).join('');
    renderPagination(total);
}

function renderPagination(total) {
    const totalPages = Math.ceil(total / pageSize);
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    pag.innerHTML = Array.from({length: totalPages}, (_, i) =>
        `<button class="page-btn${i===currentPage?' active':''}" onclick="currentPage=${i};loadProducts()">${i+1}</button>`
    ).join('');
}

function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '이용권 등록';
    ['pName','pPrice','pDuration','pDescription'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('productModal').classList.add('open');
}
function closeModal() { document.getElementById('productModal').classList.remove('open'); }

async function editProduct(id) {
    const res  = await fetch(`/api/products/${id}`);
    const json = await res.json();
    const p = json.data;
    editingId = id;
    document.getElementById('modalTitle').textContent = '이용권 수정';
    document.getElementById('pName').value        = p.name || '';
    document.getElementById('pType').value        = p.type || 'MEMBERSHIP';
    document.getElementById('pPrice').value       = p.price || 0;
    document.getElementById('pDuration').value    = p.durationDays || 0;
    document.getElementById('pDescription').value = p.description || '';
    document.getElementById('productModal').classList.add('open');
}

async function saveProduct() {
    const body = {
        name: document.getElementById('pName').value,
        type: document.getElementById('pType').value,
        price: parseInt(document.getElementById('pPrice').value) || 0,
        durationDays: parseInt(document.getElementById('pDuration').value) || 0,
        description: document.getElementById('pDescription').value,
        active: true,
    };
    const url    = editingId ? `/api/products/${editingId}` : '/api/products';
    const method = editingId ? 'PUT' : 'POST';
    await fetch(url, { method, headers: csrfHeaders(), body: JSON.stringify(body) });
    closeModal();
    loadProducts();
}

async function deleteProduct(id, name) {
    if (!confirm(`${name} 이용권을 삭제하시겠습니까?`)) return;
    await fetch(`/api/products/${id}`, { method: 'DELETE', headers: csrfHeaders() });
    loadProducts();
}

function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

loadProducts();
</script>
</body>
</html>

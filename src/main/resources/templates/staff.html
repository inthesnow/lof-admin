<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>링크온핏 CRM — 트레이너 관리</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* ── 메인 탭 ── */
        .main-tab {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color .15s, border-color .15s;
            margin-bottom: -1px;
        }
        .main-tab:hover  { color: var(--text-primary); }
        .main-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ── 출근 현황판 ── */
        .attn-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px 0;
        }
        .attn-panel-header h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }
        .attn-summary {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 6px 24px 16px;
        }
        .today-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
            padding: 0 24px 32px;
        }
        .sa-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            transition: border-color .2s;
        }
        .sa-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .sa-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .sa-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 999px;
        }
        .sa-in     { background: rgba(63,185,80,.15);  color: var(--success); }
        .sa-out    { background: rgba(139,148,158,.12); color: var(--text-muted); }
        .sa-absent { background: rgba(248,81,73,.10);   color: var(--error); }
        .sa-time {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .sa-btns { display: flex; gap: 6px; flex-wrap: wrap; }
        .sa-btn  { padding: 4px 10px; font-size: 12px; }

        /* ── 출근 기록 필터 ── */
        .attn-filter-bar {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            flex-wrap: wrap;
            padding: 20px 24px 16px;
        }
        .attn-filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .attn-filter-label {
            font-size: 12px;
            color: var(--text-muted);
        }
        .field-input {
            height: 34px;
            padding: 0 10px;
            background: var(--surface-up);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
        }
        .hist-total {
            font-size: 12px;
            color: var(--text-muted);
            padding: 0 24px 8px;
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside th:replace="~{fragments/sidebar :: sidebar('staff')}"></aside>

<main class="main">
    <header class="main-header">
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            </button>
            <h1 class="page-title">트레이너 관리</h1>
        </div>
        <div class="header-right">
            <button class="btn btn-primary" onclick="openModal()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                트레이너 등록
            </button>
        </div>
    </header>

    <!-- 메인 탭 -->
    <div style="display:flex;gap:4px;padding:0 24px;border-bottom:1px solid var(--border);background:var(--surface)">
        <button class="main-tab active" id="mainTab-list"    onclick="setMainTab('list',this)">직원 목록</button>
        <button class="main-tab"        id="mainTab-today"   onclick="setMainTab('today',this)">출근 현황판</button>
        <button class="main-tab"        id="mainTab-history" onclick="setMainTab('history',this)">출근 기록</button>
    </div>

    <!-- ── 패널: 직원 목록 ── -->
    <div id="panel-list">
        <!-- 역할 탭 -->
        <div class="sub-tabs" style="padding:0 24px;border-bottom:1px solid var(--border);background:var(--surface)">
            <button class="sub-tab active" onclick="setRoleTab('',this)">전체</button>
            <button class="sub-tab" onclick="setRoleTab('TRAINER',this)">트레이너</button>
            <button class="sub-tab" onclick="setRoleTab('ADMIN',this)">관리자</button>
            <button class="sub-tab" onclick="setRoleTab('SUPER_ADMIN',this)">슈퍼 관리자</button>
        </div>
        <div class="search-bar">
            <div class="search-input-wrap">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" class="search-input" id="staffSearch" placeholder="이름, 이메일 검색..." oninput="debounceStaffSearch()">
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>트레이너명</th><th>전화번호</th><th>이메일</th>
                        <th>역할</th><th>담당 회원수</th><th>입사일</th><th>상태</th><th>관리</th>
                    </tr>
                </thead>
                <tbody id="staffTableBody">
                    <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">로딩 중...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- ── 패널: 출근 현황판 ── -->
    <div id="panel-today" style="display:none;padding:24px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
            <div>
                <div style="font-size:18px;font-weight:700" id="todayDateLabel"></div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:2px">오늘 출근 현황 · 자동 저장됩니다</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <span id="todaySummary" style="font-size:13px;color:var(--text-secondary)"></span>
                <button class="btn btn-secondary" onclick="loadToday()">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    새로고침
                </button>
            </div>
        </div>
        <div class="today-grid" id="todayGrid">
            <div style="color:var(--text-muted);font-size:13px">로딩 중...</div>
        </div>
    </div>

    <!-- ── 패널: 출근 기록 ── -->
    <div id="panel-history" style="display:none;padding:24px">
        <div class="attn-filter-bar">
            <div class="attn-filter-group">
                <label class="attn-filter-label">시작일</label>
                <input type="date" class="field-input" id="histStart" style="width:150px">
            </div>
            <div class="attn-filter-group">
                <label class="attn-filter-label">종료일</label>
                <input type="date" class="field-input" id="histEnd" style="width:150px">
            </div>
            <div class="attn-filter-group">
                <label class="attn-filter-label">트레이너</label>
                <select class="field-input" id="histStaff" style="width:160px">
                    <option value="">전체</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="loadHistory()">조회</button>
        </div>
        <div class="table-wrap" style="margin-top:16px">
            <table>
                <thead>
                    <tr>
                        <th>날짜</th><th>이름</th><th>출근 시간</th>
                        <th>퇴근 시간</th><th>근무 시간</th><th>관리</th>
                    </tr>
                </thead>
                <tbody id="histTableBody">
                    <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">기간을 선택하고 조회하세요.</td></tr>
                </tbody>
            </table>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:10px" id="histTotal"></div>
    </div>

</main>

<!-- 직원 등록/수정 모달 -->
<div class="modal-overlay" id="staffModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">직원 등록</span>
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">이름 *</label>
                    <input type="text" class="form-input" id="sName" placeholder="홍길동">
                </div>
                <div class="form-group">
                    <label class="form-label">전화번호</label>
                    <input type="text" class="form-input" id="sPhone" placeholder="010-0000-0000">
                </div>
                <div class="form-group full">
                    <label class="form-label">이메일 <span style="color:var(--text-muted);font-size:11px">(로그인 ID)</span></label>
                    <input type="email" class="form-input" id="sEmail" placeholder="email@linkfit.com">
                </div>
                <div class="form-group">
                    <label class="form-label">역할</label>
                    <select class="form-select" id="sRole">
                        <option value="TRAINER">트레이너</option>
                        <option value="ADMIN">일반 관리자</option>
                        <option value="SUPER_ADMIN">슈퍼 관리자</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="saveStaff()">저장</button>
        </div>
    </div>
</div>

<script>
let currentPage = 0;
const pageSize = 10;
let editingId = null;
let currentRole = '';
let staffSearchTimer = null;

const roleLabel = { SUPER_ADMIN: '슈퍼 관리자', ADMIN: '일반 관리자', TRAINER: '트레이너' };
const roleBadge = { SUPER_ADMIN: 'badge-super', ADMIN: 'badge-admin', TRAINER: 'badge-trainer' };

function csrfHeaders(extra) {
    return Object.assign({ 'Content-Type': 'application/json' }, extra);
}

function setRoleTab(role, btn) {
    currentRole = role;
    currentPage = 0;
    document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    loadStaff();
}

function debounceStaffSearch() {
    clearTimeout(staffSearchTimer);
    staffSearchTimer = setTimeout(() => { currentPage = 0; loadStaff(); }, 350);
}

async function loadStaff() {
    const role = currentRole;
    const res = await fetch(`/api/staff?role=${role}&page=${currentPage}&size=${pageSize}`);
    const json = await res.json();
    renderTable(json.data.staff, json.data.total);
}

function renderTable(staff, total) {
    const tbody = document.getElementById('staffTableBody');
    if (!staff || !staff.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">트레이너 데이터가 없습니다.</td></tr>`;
        return;
    }
    tbody.innerHTML = staff.map(s => `
        <tr>
            <td>${s.name || '-'}</td>
            <td>${s.phone || '-'}</td>
            <td>${s.email || '-'}</td>
            <td><span class="badge ${roleBadge[s.role] || 'badge-trainer'}">${roleLabel[s.role] || s.role}</span></td>
            <td style="color:var(--text-secondary)">${s.assignedMemberCount != null ? s.assignedMemberCount + '명' : '-'}</td>
            <td>${s.hireDate || '-'}</td>
            <td><span class="badge ${s.status === 'ACTIVE' ? 'badge-active' : 'badge-expired'}">${s.status === 'ACTIVE' ? '재직중' : '퇴직'}</span></td>
            <td style="display:flex;gap:6px">
                <button class="btn btn-secondary" style="padding:4px 9px;font-size:12px" onclick="editStaff('${s.id}')">수정</button>
                ${s.role === 'TRAINER' ? `<button class="btn btn-secondary" style="padding:4px 9px;font-size:12px;color:var(--accent)" onclick="openDashboard('${s.id}','${(s.name||'').replace(/'/g,'')}')">상세</button>` : ''}
                <button class="btn btn-danger" style="padding:4px 9px;font-size:12px" onclick="deleteStaff('${s.id}', '${s.name}')">삭제</button>
            </td>
        </tr>
    `).join('');
    renderPagination(total);
}

function renderPagination(total) {
    const totalPages = Math.ceil(total / pageSize);
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>&#8249;</button>`;
    for (let i = 0; i < totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i + 1}</button>`;
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>&#8250;</button>`;
    pag.innerHTML = html;
}

function goPage(p) { currentPage = p; loadStaff(); }

function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '트레이너 등록';
    ['sName','sPhone','sEmail'].forEach(fid => document.getElementById(fid).value = '');
    document.getElementById('sRole').value = 'TRAINER';
    document.getElementById('staffModal').classList.add('open');
}

function closeModal() { document.getElementById('staffModal').classList.remove('open'); }

async function editStaff(id) {
    const res = await fetch(`/api/staff/${id}`);
    const json = await res.json();
    const s = json.data;
    editingId = id;
    document.getElementById('modalTitle').textContent = '직원 수정';
    document.getElementById('sName').value = s.name || '';
    document.getElementById('sPhone').value = s.phone || '';
    document.getElementById('sEmail').value = s.email || '';
    document.getElementById('sRole').value = s.role || 'TRAINER';
    document.getElementById('staffModal').classList.add('open');
}

async function saveStaff() {
    const name = document.getElementById('sName').value.trim();
    if (!name) { alert('이름을 입력해주세요.'); return; }

    const body = {
        name,
        phone: document.getElementById('sPhone').value,
        email: document.getElementById('sEmail').value,
        role:  document.getElementById('sRole').value,
    };
    const url    = editingId ? `/api/staff/${editingId}` : '/api/staff';
    const method = editingId ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: csrfHeaders(), body: JSON.stringify(body) });
    if (!res.ok) { alert('저장에 실패했습니다.'); return; }
    closeModal();
    loadStaff();
}

async function deleteStaff(id, name) {
    if (!confirm(`${name} 직원을 삭제하시겠습니까?`)) return;
    const res = await fetch(`/api/staff/${id}`, { method: 'DELETE', headers: csrfHeaders() });
    if (!res.ok) { alert('삭제에 실패했습니다.'); return; }
    loadStaff();
}

function openSidebar() {
    document.querySelector('.sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar() {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
}

// ── 메인 탭 전환 ────────────────────────────────────────────
function setMainTab(tab, btn) {
    ['list','today','history'].forEach(t => {
        document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
        document.getElementById('mainTab-' + t).classList.toggle('active', t === tab);
    });
    if (tab === 'today')   initToday();
    if (tab === 'history') initHistory();
}

loadStaff();

// ── Sector 13: 트레이너 CRM 대시보드 ──────────────────────

let dashboardTrainerId = null;

async function openDashboard(id, name) {
    dashboardTrainerId = id;
    document.getElementById('dbTitle').textContent = `${name} — CRM 대시보드`;
    document.getElementById('dbStats').innerHTML = '<div style="color:var(--text-muted);font-size:13px">로딩 중...</div>';
    document.getElementById('dbMembers').innerHTML = '';
    document.getElementById('trainerDashboardModal').classList.add('open');

    const [dashRes, membersRes] = await Promise.all([
        fetch(`/api/staff/${id}/dashboard`),
        fetch(`/api/staff/${id}/members`)
    ]);
    const dash    = await dashRes.json();
    const members = await membersRes.json();

    const d = dash.data || {};
    document.getElementById('dbStats').innerHTML = `
        <div style="display:flex;gap:12px;flex-wrap:wrap">
            <div class="db-stat"><div class="db-val">${d.assignedMembers ?? 0}</div><div class="db-key">담당 회원</div></div>
            <div class="db-stat"><div class="db-val" style="color:var(--warning)">${d.pendingFeedback ?? 0}</div><div class="db-key">피드백 대기</div></div>
            <div class="db-stat"><div class="db-val" style="color:var(--error)">${d.pendingReregistration ?? 0}</div><div class="db-key">재등록 대기</div></div>
        </div>`;

    const mList = members.data || [];
    if (!mList.length) {
        document.getElementById('dbMembers').innerHTML =
            '<div style="color:var(--text-muted);font-size:13px;padding:12px 0">배정된 회원이 없습니다.</div>';
        return;
    }
    const tierLabel = { BASIC:'기본', LIGHT_FIT:'라이트', REGULAR_FIT:'레귤러', INTENSIVE_FIT:'인텐시브' };
    document.getElementById('dbMembers').innerHTML = `
        <div style="font-size:12px;color:var(--text-muted);margin:12px 0 8px">담당 회원 목록</div>
        <div style="max-height:200px;overflow-y:auto">
        ${mList.map(m => `
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
                <span>${m.name || '-'}</span>
                <span style="color:var(--text-muted)">${m.phone || ''}</span>
                <span class="badge badge-pending" style="font-size:11px">${tierLabel[m.tier] || m.tier || '-'}</span>
            </div>`).join('')}
        </div>`;
}

function closeDashboardModal() {
    document.getElementById('trainerDashboardModal').classList.remove('open');
    dashboardTrainerId = null;
}

// ═══════════════════════════════════════════════════════════
// 출근 현황판
// ═══════════════════════════════════════════════════════════
let todayLoaded = false;

function initToday() {
    if (!todayLoaded) loadToday();
}

async function loadToday() {
    todayLoaded = true;
    const today = new Date();
    document.getElementById('todayDateLabel').textContent =
        today.getFullYear() + '년 ' + (today.getMonth()+1) + '월 ' + today.getDate() + '일 (오늘)';

    const res  = await fetch('/api/staff/attendance/today');
    const json = await res.json();
    renderTodayGrid(json.data || []);
}

function renderTodayGrid(list) {
    const grid = document.getElementById('todayGrid');
    const inCount  = list.filter(s => s.id && !s.checkOut).length;
    const outCount = list.filter(s => s.id && s.checkOut).length;
    const abCount  = list.filter(s => !s.id).length;
    document.getElementById('todaySummary').textContent =
        `출근 ${inCount}명 · 퇴근 ${outCount}명 · 미출근 ${abCount}명`;

    if (!list.length) { grid.innerHTML = '<div style="color:var(--text-muted);font-size:13px">등록된 트레이너가 없습니다.</div>'; return; }

    grid.innerHTML = list.map(s => {
        const isIn    = !!s.id && !s.checkOut;
        const isOut   = !!s.id && !!s.checkOut;
        const isAbsent = !s.id;
        const borderColor = isIn ? 'var(--success)' : isOut ? 'var(--text-muted)' : 'var(--border)';
        const badgeHtml   = isIn    ? `<span class="sa-badge sa-in">출근</span>`
                          : isOut   ? `<span class="sa-badge sa-out">퇴근</span>`
                          : `<span class="sa-badge sa-absent">미출근</span>`;

        const timeHtml = s.checkIn ? `
            <div class="sa-time">
                <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
                출근 ${s.checkIn}${s.checkOut ? ' &nbsp;→&nbsp; 퇴근 ' + s.checkOut : ''}
            </div>` : '';

        const btns = isAbsent
            ? `<button class="btn btn-secondary sa-btn" style="color:var(--success)" onclick="doCheckIn('${s.userId}','${(s.staffName||'').replace(/'/g,'')}')">출근 체크</button>`
            : isIn
            ? `<button class="btn btn-secondary sa-btn" style="color:var(--warning)" onclick="doCheckOut(${s.id},'${(s.staffName||'').replace(/'/g,'')}')">퇴근 체크</button>
               <button class="btn btn-secondary sa-btn" style="color:var(--error)" onclick="deleteAttendance(${s.id},'${(s.staffName||'').replace(/'/g,'')}')">삭제</button>`
            : `<button class="btn btn-secondary sa-btn" style="color:var(--error)" onclick="deleteAttendance(${s.id},'${(s.staffName||'').replace(/'/g,'')}')">기록 삭제</button>`;

        return `
        <div class="sa-card" style="border-color:${borderColor}">
            <div class="sa-card-top">
                <span class="sa-name">${s.staffName || s.userId}</span>
                ${badgeHtml}
            </div>
            ${timeHtml}
            <div class="sa-btns">${btns}</div>
        </div>`;
    }).join('');
}

async function doCheckIn(userId, name) {
    const now = new Date();
    const time = now.toTimeString().slice(0,5);
    if (!confirm(`${name} — ${time} 출근 처리하시겠습니까?`)) return;
    await fetch('/api/staff/attendance/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, time })
    });
    loadToday();
}

async function doCheckOut(id, name) {
    const now = new Date();
    const time = now.toTimeString().slice(0,5);
    if (!confirm(`${name} — ${time} 퇴근 처리하시겠습니까?`)) return;
    await fetch(`/api/staff/attendance/${id}/checkout`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ time })
    });
    loadToday();
}

async function deleteAttendance(id, name) {
    if (!confirm(`${name}의 오늘 출근 기록을 삭제하시겠습니까?`)) return;
    await fetch(`/api/staff/attendance/${id}`, { method: 'DELETE' });
    loadToday();
}

// ═══════════════════════════════════════════════════════════
// 출근 기록
// ═══════════════════════════════════════════════════════════
let historyLoaded = false;
let staffList = [];

async function initHistory() {
    if (!historyLoaded) {
        historyLoaded = true;
        // 기본 날짜: 이번달 1일 ~ 오늘
        const today = new Date();
        const y = today.getFullYear(), m = String(today.getMonth()+1).padStart(2,'0');
        document.getElementById('histStart').value = `${y}-${m}-01`;
        document.getElementById('histEnd').value   = today.toISOString().slice(0,10);

        // 트레이너 목록 로드
        const res  = await fetch('/api/staff?role=TRAINER&page=0&size=100');
        const json = await res.json();
        staffList  = (json.data?.staff || []);
        const sel  = document.getElementById('histStaff');
        sel.innerHTML = '<option value="">전체</option>' +
            staffList.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

        loadHistory();
    }
}

async function loadHistory() {
    const start   = document.getElementById('histStart').value;
    const end     = document.getElementById('histEnd').value;
    const staffId = document.getElementById('histStaff').value;
    if (!start || !end) { alert('기간을 선택해주세요.'); return; }

    const res  = await fetch(`/api/staff/attendance?startDate=${start}&endDate=${end}&staffId=${staffId}`);
    const json = await res.json();
    renderHistoryTable(json.data || []);
}

function renderHistoryTable(list) {
    const tbody = document.getElementById('histTableBody');
    document.getElementById('histTotal').textContent = list.length ? `총 ${list.length}건` : '';
    if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">출근 기록이 없습니다.</td></tr>';
        return;
    }
    tbody.innerHTML = list.map(r => {
        const workMin = (r.checkIn && r.checkOut) ? calcMinutes(r.checkIn, r.checkOut) : null;
        const workStr = workMin != null ? Math.floor(workMin/60) + 'h ' + (workMin%60) + 'm' : '-';
        return `<tr>
            <td>${r.attendDate}</td>
            <td>${r.staffName || r.userId}</td>
            <td style="color:var(--success)">${r.checkIn || '-'}</td>
            <td style="color:var(--warning)">${r.checkOut || '-'}</td>
            <td>${workStr}</td>
            <td><button class="btn btn-secondary" style="padding:3px 9px;font-size:12px;color:var(--error)"
                onclick="deleteHistRecord(${r.id})">삭제</button></td>
        </tr>`;
    }).join('');
}

function calcMinutes(inStr, outStr) {
    const [ih, im] = inStr.split(':').map(Number);
    const [oh, om] = outStr.split(':').map(Number);
    return (oh * 60 + om) - (ih * 60 + im);
}

async function deleteHistRecord(id) {
    if (!confirm('이 출근 기록을 삭제하시겠습니까?')) return;
    await fetch(`/api/staff/attendance/${id}`, { method: 'DELETE' });
    loadHistory();
}

</script>

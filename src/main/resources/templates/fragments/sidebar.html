<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activePage)" class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon-sm">

        </div>
        <span class="logo-text">LINK_Fit</span>
        <span class="logo-badge">ADMIN</span>

    <div class="sidebar-user">
        <div class="user-avatar">관</div>
        <div class="user-info">
            <span class="user-name">관리자</span>

            PT 관리
        </a>
        <a th:href="@{/reregistration}" th:classappend="${activePage == 'reregistration'} ? ' active'" class="nav-item">

        <a th:href="@{/products}" th:classappend="${activePage == 'products'} ? ' active'" class="nav-item">

        <a th:href="@{/messages}" th:classappend="${activePage == 'messages'} ? ' active'" class="nav-item">

        <a th:href="@{/announcements}" th:classappend="${activePage == 'announcements'} ? ' active'" class="nav-item">

            공지사항

    <div class="sidebar-footer">
        <button type="button" class="logout-btn" onclick="doLogout()"
                style="width:100%;background:none;border:none;cursor:pointer;text-align:left">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            로그아웃
        </button>
    </div>
</aside>
<style>
.nav-badge {
    margin-left: auto; background: var(--error); color: #fff;
    font-size: 10px; font-weight: 700; border-radius: 10px;
    padding: 1px 6px; min-width: 16px; text-align: center;
}
</style>
<script>
function doLogout() {
    fetch('/api/auth/logout', { method: 'POST' })
        .then(() => { location.href = '/login?logout'; });
}
(function loadUnreadCount() {
    fetch('/api/inbox/unread-count').then(r => r.json()).then(j => {
        const el = document.getElementById('inboxUnread');
        if (el && j.data > 0) { el.textContent = j.data; el.style.display = 'inline'; }
    }).catch(() => {});
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activePage)" class="sidebar">

    <div class="sidebar-logo">
        <div class="logo-icon-sm">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>
        <span class="logo-text">링크온핏</span>
        <span class="logo-badge">CRM</span>
    </div>

    <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">관</div>
        <div class="user-info">
            <span class="user-name" id="sidebarUserName">관리자</span>
            <span class="user-role" id="sidebarUserRole">슈퍼 관리자</span>
        </div>
    </div>

    <nav class="sidebar-nav">

        <a th:href="@{/dashboard}"       th:classappend="${activePage == 'dashboard'}       ? ' active'" class="nav-item">

            대시보드
        </a>

        <span class="nav-section-label">회원</span>

        <a th:href="@{/members}"         th:classappend="${activePage == 'members'}         ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>

        <a th:href="@{/pt}"              th:classappend="${activePage == 'pt'}              ? ' active'" class="nav-item">

        <a th:href="@{/reregistration}"  th:classappend="${activePage == 'reregistration'}  ? ' active'" class="nav-item">

            재등록 관리
        </a>

        <span class="nav-section-label">루틴 / 출석</span>

        <a th:href="@{/classes}"         th:classappend="${activePage == 'classes'}         ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
            루틴 관리
        </a>

        <a th:href="@{/attendance}"      th:classappend="${activePage == 'attendance'}      ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>

        </a>

        <span class="nav-section-label">피드백 / 티켓</span>

        <a th:href="@{/feedback}"        th:classappend="${activePage == 'feedback'}        ? ' active'" class="nav-item">

            피드백 관리
        </a>

        <a th:href="@{/products}"        th:classappend="${activePage == 'products'}        ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 7H5c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-8 8H9v-2h2v2zm0-4H9V9h2v2zm4 4h-2v-2h2v2zm0-4h-2V9h2v2z"/></svg>
            티켓 관리
        </a>

        <span class="nav-section-label">커뮤니케이션</span>

        <a th:href="@{/consults}"        th:classappend="${activePage == 'consults'}        ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            상담 관리
        </a>

        <a th:href="@{/inbox}"           th:classappend="${activePage == 'inbox'}           ? ' active'" class="nav-item">

            쪽지함
            <span class="nav-badge" id="inboxUnread" style="display:none"></span>
        </a>

        <a th:href="@{/cs}"              th:classappend="${activePage == 'cs'}              ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            CS 관리
        </a>

        <a th:href="@{/announcements}"   th:classappend="${activePage == 'announcements'}   ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg>
            알림 / 공지
        </a>

        <span class="nav-section-label">운영</span>

        <a th:href="@{/staff}"           th:classappend="${activePage == 'staff'}           ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.34 0-2.23-2.5-3.66-4.84-2.41L12 3.17l-1.16-.92C8.5.99 6 2.42 6 4.66c0 .46.11.9.18 1.34H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
            트레이너 관리
        </a>

        <a th:href="@{/crm-sales}"       th:classappend="${activePage == 'crm-sales'}       ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
            매출 관리
        </a>

        <a th:href="@{/revenue}"         th:classappend="${activePage == 'revenue'}         ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z"/></svg>
            통계 / 리포트
        </a>

        <span class="nav-section-label" style="margin-top:4px">설정</span>

        <a th:href="@{/settings}"        th:classappend="${activePage == 'settings'}        ? ' active'" class="nav-item">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            설정
        </a>

    </nav>

    <div class="sidebar-footer">
        <button type="button" class="logout-btn" onclick="doLogout()"
                style="width:100%;background:none;border:none;cursor:pointer;text-align:left">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
            로그아웃
        </button>
    </div>

</aside>
<script>
function doLogout() {
    fetch('/api/auth/logout', { method: 'POST' })
        .then(() => { location.href = '/login?logout'; });
}
(function loadUnreadCount() {
    fetch('/api/inbox/unread-count').then(r => r.json()).then(j => {
        const el = document.getElementById('inboxUnread');
        if (el && j.data > 0) { el.textContent = j.data; el.style.display = 'inline'; }
    }).catch(() => {});
})();
(function loadUserInfo() {
    fetch('/api/auth/me').then(r => r.ok ? r.json() : null).then(j => {
        if (!j || !j.data) return;
        const av = document.getElementById('sidebarAvatar');
        const nm = document.getElementById('sidebarUserName');
        const rl = document.getElementById('sidebarUserRole');
        if (av && j.data.name) av.textContent = j.data.name.charAt(0);
        if (nm && j.data.name) nm.textContent = j.data.name;
        const roleMap = { super_admin: '슈퍼 관리자', gym_admin: '헬스장 관리자', trainer: '트레이너' };
        if (rl && j.data.role) rl.textContent = roleMap[j.data.role] || j.data.role;
    }).catch(() => {});
})();
</script>
</body>
</html>

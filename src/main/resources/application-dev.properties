spring.datasource.url=jdbc:mariadb://localhost:3306/linkfit?allowMultiQueries=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=linkfit
spring.datasource.password=link_fit!

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.linkfit.admin.domain
mybatis.configuration.map-underscore-to-camel-case=true

logging.level.com.linkfit.admin=DEBUG
logging.level.org.springframework.security=DEBUG

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.linkfit.admin.domain
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION_MS:86400000}
    cookie-name: crm_token
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://admin.linkonfit.co.kr}

server:
  forward-headers-strategy: native
  tomcat:
    accesslog:
      enabled: true
      directory: /opt/lof-admin/logs
      prefix: access
      suffix: .log
      # 날짜별 로테이트: access.log.2026-06-14
      file-date-format: .yyyy-MM-dd
      rotate: true
      # IP, 메서드, URI, 상태코드, 바이트, 응답시간(ms)
      pattern: "%{yyyy-MM-dd HH:mm:ss.SSS}t %a \"%m %U%q\" %s %b %Dms"
      buffered: false   # 즉시 flush (버퍼 없이 실시간 기록)

# 로그 레벨은 logback-spring.xml springProfile(prod) 블록에서 관리

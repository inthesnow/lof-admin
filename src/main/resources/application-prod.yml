spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    driver-class-name: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.linkfit.admin.domain
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION_MS:86400000}
    cookie-name: crm_token
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://admin.linkonfit.co.kr}

server:
  forward-headers-strategy: native

# 로그 레벨은 logback-spring.xml springProfile(prod) 블록에서 관리
